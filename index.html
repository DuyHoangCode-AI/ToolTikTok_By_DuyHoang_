<!DOCTYPE html>

<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dịch Vụ TikTok Pro Duy Hoang</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0f1a;
            --bg-card: #111827;
            --bg-panel: #1e293b;
            --teal: #2dd4bf;
            --teal-dim: #14b8a6;
            --teal-glow: rgba(45,212,191,0.15);
            --teal-border: rgba(45,212,191,0.3);
            --green: #4ade80;
            --red: #f87171;
            --yellow: #facc15;
            --sky: #38bdf8;
            --orange: #fb923c;
            --purple: #a78bfa;
            --text-primary: #f3f4f6;
            --text-muted: #9ca3af;
            --text-dim: #6b7280;
            --border: rgba(255,255,255,0.1);
            --radius-lg: 18px;
            --radius-pill: 999px;
            --font: 'Be Vietnam Pro', sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; min-width: 0; -webkit-tap-highlight-color: transparent; }
        html { font-size: 16px; }
        body {
            min-height: 100vh;
            background: var(--bg-dark);
            font-family: var(--font);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 12px 12px 48px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(45,212,191,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(45,212,191,0.03) 1px, transparent 1px);
            background-size: 36px 36px;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            width: 500px; height: 300px;
            background: radial-gradient(ellipse, rgba(45,212,191,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        .glass-card {
            max-width: 480px;
            width: 100%;
            background: var(--bg-card);
            border-radius: 22px;
            border: 1px solid var(--teal-border);
            box-shadow: 0 0 0 1px rgba(45,212,191,0.05), 0 24px 48px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05);
            overflow: hidden;
            position: relative;
            z-index: 1;
            margin-top: 12px;
        }
        .header {
            padding: 22px 20px 18px;
            text-align: center;
            background: linear-gradient(160deg, #0f172a 0%, #0a0f1a 100%);
            border-bottom: 1px solid var(--teal-border);
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -30px; left: 50%;
            transform: translateX(-50%);
            width: 180px; height: 90px;
            background: radial-gradient(ellipse, rgba(45,212,191,0.2) 0%, transparent 70%);
        }
        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(45,212,191,0.12);
            border: 1px solid var(--teal-border);
            border-radius: var(--radius-pill);
            padding: 3px 11px;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--teal);
            letter-spacing: 1.2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-family: var(--mono);
        }
        .header h1 {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            line-height: 1.2;
            position: relative;
            font-family: var(--font);
        }
        .header h1 span { color: var(--teal); }
        .header p {
            color: var(--text-muted);
            font-size: 0.78rem;
            margin-top: 5px;
            font-weight: 500;
            font-family: var(--font);
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .hamburger {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.8rem;
            cursor: pointer;
            padding: 5px;
            line-height: 1;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            z-index: 20;
        }
        .hamburger:hover {
            background: var(--teal-glow);
            border-color: var(--teal);
            color: var(--teal);
        }
        .menu-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 100;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .menu-overlay.show { visibility: visible; opacity: 1; }
        .menu-drawer {
            position: fixed;
            top: 0; right: 0;
            width: 260px;
            height: 100%;
            background: rgba(15,23,42,0.98);
            backdrop-filter: blur(12px);
            border-left: 1px solid var(--teal-border);
            transform: translateX(100%);
            transition: transform 0.25s ease;
            z-index: 101;
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }
        .menu-drawer.show { transform: translateX(0); }
        .menu-drawer .menu-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            transition: all 0.18s;
            width: 100%;
            text-align: left;
        }
        .menu-drawer .menu-btn:hover {
            background: var(--teal-glow);
            border-color: var(--teal);
            color: var(--teal);
        }
        .menu-drawer .menu-btn.menu-btn-support {
            border-color: rgba(167,139,250,0.3);
            color: var(--purple);
            background: rgba(167,139,250,0.08);
        }
        .menu-drawer .menu-btn.menu-btn-support:hover {
            background: rgba(167,139,250,0.18);
            border-color: var(--purple);
            color: var(--purple);
        }
        .menu-drawer .menu-btn .icon { font-size: 1.2rem; }
        .menu-drawer .close-drawer {
            align-self: flex-end;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }
        .content { padding: 16px 14px 20px; overflow: hidden; }
        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px 14px;
            animation: fadeIn 0.2s ease;
            overflow: hidden;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .panel-title {
            font-size: 0.72rem;
            font-weight: 800;
            color: var(--teal);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--mono);
        }
        .panel-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--teal-border);
        }
        .panel-title.purple-title { color: var(--purple); }
        .panel-title.purple-title::after { background: rgba(167,139,250,0.3); }
        .form-group { margin-bottom: 12px; width: 100%; overflow: hidden; }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 700;
            color: var(--text-muted);
            font-size: 0.7rem;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            font-family: var(--font);
        }
        input, select, textarea {
            width: 100%;
            min-width: 0;
            padding: 11px 14px;
            border-radius: 11px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.4);
            color: var(--text-primary);
            font-size: 0.88rem;
            font-family: var(--font);
            outline: none;
            transition: all 0.18s;
            display: block;
            -webkit-appearance: none;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
            line-height: 1.5;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--teal-border);
            box-shadow: 0 0 0 3px var(--teal-glow);
            background: rgba(0,0,0,0.55);
        }
        input::placeholder, textarea::placeholder { color: var(--text-dim); }
        select option { background: #1e293b; }
        .btn {
            width: 100%;
            padding: 12px 14px;
            border: none;
            border-radius: 11px;
            font-family: var(--font);
            font-weight: 800;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.18s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            letter-spacing: 0.2px;
            -webkit-appearance: none;
        }
        .btn + .btn { margin-top: 7px; }
        .btn-primary {
            background: linear-gradient(135deg, var(--teal-dim), #0f766e);
            color: white;
            box-shadow: 0 4px 14px rgba(20,184,166,0.22);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--teal), var(--teal-dim));
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(45,212,191,0.28);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
        .btn-danger {
            background: rgba(248,113,113,0.1);
            color: var(--red);
            border: 1px solid rgba(248,113,113,0.2);
        }
        .btn-danger:hover { background: rgba(248,113,113,0.18); }
        .btn-orange {
            background: linear-gradient(135deg, #ea580c, #c2410c);
            color: white;
            box-shadow: 0 4px 14px rgba(234,88,12,0.22);
        }
        .btn-orange:hover {
            background: linear-gradient(135deg, #f97316, #ea580c);
            transform: translateY(-1px);
        }
        .btn-purple {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: white;
            box-shadow: 0 4px 14px rgba(124,58,237,0.25);
        }
        .btn-purple:hover {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(139,92,246,0.3);
        }
        .btn:active { transform: scale(0.97) !important; }
        .service-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px;
            margin-bottom: 14px;
        }
        .service-tab {
            padding: 11px;
            border-radius: 11px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            cursor: pointer;
            text-align: center;
            transition: all 0.18s;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-muted);
            font-family: var(--font);
        }
        .service-tab .tab-icon { font-size: 1.3rem; display: block; margin-bottom: 3px; }
        .service-tab .tab-price { font-size: 0.64rem; color: var(--text-dim); margin-top: 2px; font-family: var(--mono); }
        .service-tab.active { background: var(--teal-glow); border-color: var(--teal); color: var(--teal); }
        .service-tab.active .tab-price { color: var(--teal-dim); }
        .price-estimate {
            background: rgba(45,212,191,0.08);
            border: 1px solid var(--teal-border);
            border-radius: 9px;
            padding: 9px 12px;
            text-align: center;
            font-size: 0.78rem;
            color: var(--sky);
            margin: 10px 0;
            font-family: var(--mono);
        }
        .balance-display {
            text-align: center;
            padding: 20px 14px;
        }
        .balance-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            font-family: var(--mono);
            margin-bottom: 6px;
        }
        .balance-value {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--green);
            font-family: var(--mono);
            letter-spacing: -1px;
            text-shadow: 0 0 28px rgba(74,222,128,0.3);
        }
        .balance-sub {
            font-size: 0.72rem;
            color: var(--text-dim);
            margin-top: 4px;
            font-family: var(--mono);
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 9px;
            border-radius: var(--radius-pill);
            font-size: 0.65rem;
            font-weight: 700;
            font-family: var(--mono);
            letter-spacing: 0.4px;
        }
        .status-pending { background: rgba(250,204,21,0.12); color: var(--yellow); border: 1px solid rgba(250,204,21,0.3); }
        .status-inprogress { background: rgba(56,189,248,0.12); color: var(--sky); border: 1px solid rgba(56,189,248,0.3); }
        .status-completed { background: rgba(74,222,128,0.12); color: var(--green); border: 1px solid rgba(74,222,128,0.3); }
        .status-partial { background: rgba(250,204,21,0.12); color: var(--yellow); border: 1px solid rgba(250,204,21,0.3); }
        .status-cancelled, .status-error { background: rgba(248,113,113,0.12); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
        .status-support { background: rgba(167,139,250,0.12); color: var(--purple); border: 1px solid rgba(167,139,250,0.3); }
        .history-item {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 11px;
            padding: 11px 12px;
            margin-bottom: 7px;
            transition: border-color 0.18s;
            cursor: pointer;
        }
        .history-item:hover { border-color: var(--teal-border); }
        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .history-id { font-family: var(--mono); font-size: 0.76rem; font-weight: 700; color: var(--teal); }
        .history-date { font-size: 0.64rem; color: var(--text-dim); font-family: var(--font); }
        .history-detail { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 3px; font-family: var(--font); }
        .history-link { font-size: 0.64rem; color: var(--text-dim); font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status-result-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--teal-border);
            border-radius: 13px;
            padding: 14px;
            margin-top: 12px;
        }
        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.78rem;
        }
        .status-row:last-child { border-bottom: none; padding-bottom: 0; }
        .status-key { color: var(--text-dim); font-family: var(--mono); font-size: 0.68rem; text-transform: uppercase; }
        .status-val { color: var(--text-primary); font-weight: 700; text-align: right; font-family: var(--font); }
        .info-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px;
            margin-bottom: 10px;
        }
        .info-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 11px;
            padding: 11px;
            text-align: center;
        }
        .info-card .ic-icon { font-size: 1.3rem; margin-bottom: 4px; }
        .info-card .ic-title { font-size: 0.68rem; color: var(--text-muted); font-weight: 700; font-family: var(--font); }
        .info-card .ic-price { font-size: 0.74rem; color: var(--teal); font-family: var(--mono); font-weight: 700; margin-top: 2px; }
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 14px;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.18s;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(45,212,191,0.12);
            border-top-color: var(--teal);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 0.85rem; color: var(--text-muted); font-family: var(--mono); }
        .toast-msg {
            position: fixed;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%) translateY(8px);
            background: rgba(10,20,32,0.96);
            backdrop-filter: blur(12px);
            padding: 9px 18px;
            border-radius: var(--radius-pill);
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.82rem;
            z-index: 1100;
            border: 1px solid var(--teal-border);
            pointer-events: none;
            white-space: nowrap;
            visibility: hidden;
            opacity: 0;
            transition: all 0.2s;
            font-family: var(--font);
        }
        .start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 36px 16px;
            gap: 18px;
            min-height: 240px;
        }
        .btn-start {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
            font-size: 1.1rem;
            font-weight: 900;
            padding: 15px 40px;
            border-radius: var(--radius-pill);
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 28px rgba(245,158,11,0.32);
            transition: all 0.22s;
            letter-spacing: 1.5px;
            display: inline-flex;
            align-items: center;
            gap: 9px;
            font-family: var(--font);
        }
        .btn-start:hover { transform: scale(1.04); box-shadow: 0 14px 36px rgba(245,158,11,0.45); }
        .key-box { width: 100%; max-width: 260px; display: flex; flex-direction: column; gap: 7px; overflow: hidden; }
        .error-shake { animation: shake 0.3s ease-in-out; border-color: var(--red) !important; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .success-card { text-align: center; padding: 18px 8px; }
        .success-icon { font-size: 2.6rem; margin-bottom: 8px; }
        .success-title { font-size: 1rem; font-weight: 900; color: var(--green); margin-bottom: 10px; font-family: var(--font); }
        .success-detail { background: rgba(0,0,0,0.3); border-radius: 11px; padding: 12px; margin-bottom: 12px; }
        .success-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 0.78rem; border-bottom: 1px solid var(--border); }
        .success-row:last-child { border-bottom: none; }
        .success-row .sk { color: var(--text-dim); font-family: var(--font); }
        .success-row .sv { color: var(--text-primary); font-weight: 700; font-family: var(--mono); }
        .deposit-amounts {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 7px;
            margin-bottom: 14px;
        }
        .amt-btn {
            padding: 10px 6px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-muted);
            font-family: var(--font);
            font-size: 0.76rem;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
        }
        .amt-btn:hover, .amt-btn.selected {
            background: var(--teal-glow);
            border-color: var(--teal);
            color: var(--teal);
        }
        .qr-container { text-align: center; padding: 14px 0 6px; }
        .qr-img {
            width: 200px; height: 200px;
            border-radius: 14px;
            border: 2px solid var(--teal-border);
            object-fit: cover;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .bank-info {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 11px;
            padding: 10px 12px;
            margin: 10px 0;
            text-align: center;
        }
        .bank-info .bi-name { font-size: 0.7rem; color: var(--text-dim); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }
        .bank-info .bi-val { font-size: 0.88rem; font-weight: 800; color: var(--text-primary); font-family: var(--mono); }
        .deposit-note { font-size: 0.7rem; color: var(--text-dim); text-align: center; line-height: 1.5; padding: 0 4px; font-family: var(--font); }
        .deposit-note span { color: var(--yellow); font-weight: 700; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--teal-border); border-radius: 3px; }
        .support-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 12px 0;
        }
        .support-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            padding: 8px 16px;
            font-size: 0.8rem;
            font-weight: 600;

    async function fetchOrdersFromTelegram() {
        try {
            const res = await fetch(`https://api.telegram.org/bot${TELE_TOKEN}/getUpdates?limit=100&offset=-100`);
            const data = await res.json();
            if (!data.ok || !data.result) return [];
            const orders = [];
            for (const update of data.result) {
                const msg = update.message || update.channel_post;
                if (!msg || !msg.text) continue;
                const text = msg.text;
                if (!text.includes('ĐƠN MỚI') && !text.includes('Order ID')) continue;
                const order = { raw: text, date: new Date(msg.date * 1000).toLocaleString('vi-VN') };
                const orderIdMatch = text.match(/Order ID[:\s]*(\d+)/i);
                if (orderIdMatch) order.order_id = orderIdMatch[1];
                const svcMatch = text.match(/ĐƠN MỚI[:\s]*([^\n]+)/i);
                if (svcMatch) order.service_name = svcMatch[1].trim();
                const slMatch = text.match(/SL[:\s]*([\d,\.]+)/i);
                if (slMatch) order.quantity = slMatch[1].replace(/[,\.]/g, '');
                const linkMatch = text.match(/Link[:\s]*(https?:\/\/[^\n]+)/i);
                if (linkMatch) order.link = linkMatch[1].trim();
                const noteMatch = text.match(/Tên[:\s]*([^\n]+)/i);
                if (noteMatch) order.note = noteMatch[1].trim();
                const priceMatch = text.match(/Ước tính[:\s]*([\d,\.]+)đ/i);
                if (priceMatch) order.price = priceMatch[1];
                const svcIdMatch = text.match(/Service ID[:\s]*(\d+)/i);
                if (svcIdMatch) order.service_id = svcIdMatch[1];
                if (order.order_id) orders.push(order);
            }
            const seen = new Set();
            return orders.filter(o => {
                if (seen.has(o.order_id)) return false;
                seen.add(o.order_id);
                return true;
            }).reverse();
        } catch(e) { return []; }
    }

            /^https?:\/\/(?:www\.)?tiktok\.com\/t\/\w+\/?$/
        ].some(p => p.test(url.trim()));
    }

        if (s === 'partial') return `<span class="status-badge status-partial">◑ Một phần</span>`;
        if (s === 'cancelled' || s === 'canceled') return `<span class="status-badge status-cancelled">✕ Đã hủy</span>`;
        return `<span class="status-badge status-pending">⏳ Chờ xử lý</span>`;

    function checkSubKeyLimit(serviceType, quantity) {
        if (isAdmin) return { allowed: true };
        const usage = subKeyUsage[currentUserKey];
        if (!usage) return { allowed: false, message: "Key không hợp lệ!" };
        const keyInfo = SUB_KEYS.find(k => k.key === currentUserKey);
        if (!keyInfo) return { allowed: false, message: "Key không được cấu hình!" };
        if (serviceType === 'view') {
            const remaining = keyInfo.max_views - usage.views_used;
            if (remaining < quantity) return { allowed: false, message: `Bạn chỉ còn ${remaining.toLocaleString()} view, không đủ ${quantity.toLocaleString()} view.` };
        } else if (serviceType === 'like') {
            const remaining = keyInfo.max_likes - usage.likes_used;
            if (remaining < quantity) return { allowed: false, message: `Bạn chỉ còn ${remaining.toLocaleString()} tim, không đủ ${quantity.toLocaleString()} tim.` };
        }
        return { allowed: true };
    }
    function consumeSubKey(serviceType, quantity) {
        if (isAdmin) return;
        const usage = subKeyUsage[currentUserKey];
        if (serviceType === 'view') usage.views_used += quantity;
        else if (serviceType === 'like') usage.likes_used += quantity;
        saveSubKeyUsage();
    }
    function getRemainingLimits() {
        if (isAdmin) return { views: '∞', likes: '∞', logins: '∞' };
        const keyInfo = SUB_KEYS.find(k => k.key === currentUserKey);
        const usage = subKeyUsage[currentUserKey];
        if (!keyInfo || !usage) return { views: 0, likes: 0, logins: 0 };
        return {
            views: keyInfo.max_views - usage.views_used,
            likes: keyInfo.max_likes - usage.likes_used,
            logins: keyInfo.max_logins - usage.logins_used
        };
    }

        </div>

    document.querySelectorAll('.btn-action-support').forEach(btn => {
        btn.onclick = () => {
            const sid = parseInt(btn.dataset.sid);
            const action = btn.dataset.action;
            const idx = supportRequests.findIndex(r => r.id === sid);
            if (idx === -1) return;

            if (action === 'delete') {
                if (!confirm("Xóa yêu cầu hỗ trợ này?")) return;
                supportRequests.splice(idx, 1);
                saveSupportRequests();
                showToast("✅ Đã xóa");
                showManageSupportUI();
            } else {
                supportRequests[idx].status = action;
                saveSupportRequests();
                showToast(action === 'done' ? "✅ Đã đánh dấu hoàn thành" : "⚙️ Đang xử lý");
                showManageSupportUI();
            }
        };
    });

    // Click vào item để check đơn
    document.querySelectorAll('.support-request-item').forEach(item => {
        item.onclick = (e) => {
            if (e.target.closest('.btn-action-support')) return;
            const sid = parseInt(item.dataset.sid);
            const req = supportRequests.find(r => r.id === sid);
            if (!req || !req.order_id) return;
            showCheckOrderUI();
            setTimeout(() => {
                const inp = document.getElementById('checkOrderId');
                if (inp) { inp.value = req.order_id; document.getElementById('checkBtn')?.click(); }
            }, 100);
        };
    });

    document.getElementById('backManageSupport').onclick = () => renderDefaultPanel();
    updateDrawerButtons(); // cập nhật badge
}

                    <label>🎯 Chọn loại dịch vụ</label>
                    <div id="idPicker" style="display:flex; flex-direction:column; gap:7px; margin-bottom:2px;">
                        ${idList.length === 0 ? `<div style="color:var(--red);font-size:0.78rem;">⚠️ Không có dịch vụ</div>` :
                        idList.map((entry, i) => `
                            <div class="id-pick-item" data-idx="${i}" style="background:${i === selectedSvcIdx ? 'var(--teal-glow)' : 'rgba(0,0,0,0.3)'};border:1px solid ${i === selectedSvcIdx ? 'var(--teal)' : 'var(--border)'};border-radius:10px; padding:10px 12px; cursor:pointer; transition:all 0.15s;">
                                <div style="display:flex;justify-content:space-between;align-items:center;">
                                    <span style="font-weight:800;font-size:0.82rem;font-family:var(--font);color:${i === selectedSvcIdx ? 'var(--teal)' : 'var(--text-primary)'};">${entry.name}</span>
                                    <span style="font-family:var(--mono);font-size:0.72rem;color:var(--yellow);font-weight:700;">${entry.price.toLocaleString('vi-VN')}đ/min</span>
                                </div>
                                <div style="display:flex;gap:10px;margin-top:3px;">
                                    <span style="font-size:0.65rem;color:var(--text-dim);font-family:var(--mono);">ID: ${entry.id}</span>
                                    <span style="font-size:0.65rem;color:var(--text-dim);font-family:var(--font);">Min: ${entry.min.toLocaleString()}</span>
                                </div>
                                ${entry.desc ? `<div style="font-size:0.68rem;color:var(--text-muted);margin-top:2px;font-family:var(--font);">${entry.desc}</div>` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="form-group"><label>🔗 Link video TikTok</label><input type="text" id="videoLink" placeholder="https://www.tiktok.com/@user/video/..."></div>
                <div class="form-group"><label>🔢 Số lượng ${svcInfo.unit}${selectedEntry ? ' (tối thiểu ' + selectedEntry.min.toLocaleString() + ')' : ''}</label><input type="number" id="quantity" placeholder="${selectedEntry ? selectedEntry.min : 1000}" min="${selectedEntry ? selectedEntry.min : 1}" step="${selectedService === 'view' ? 100 : 50}"></div>
                <div class="form-group"><label>👤 Tên của bạn (gửi lên Telegram)</label><input type="text" id="orderNote" placeholder="Nhập tên của bạn..."></div>
                <div class="price-estimate" id="priceEst">💰 Nhập số lượng để xem ước tính</div>
                <button class="btn btn-primary" id="submitBtn">🚀 Tạo đơn ngay</button>
                <button class="btn btn-secondary" id="cancelBtn">↩ Hủy</button>
            </div>
        `;
        document.querySelectorAll('.service-tab').forEach(t => { t.onclick = () => { selectedService = t.dataset.s; selectedSvcIdx = 0; renderForm(); }; });
        document.querySelectorAll('.id-pick-item').forEach(el => { el.onclick = () => { selectedSvcIdx = parseInt(el.dataset.idx); renderForm(); }; });
        const qtyInput = document.getElementById('quantity');
        const estDiv = document.getElementById('priceEst');
        qtyInput.oninput = () => {
            const qty = parseInt(qtyInput.value);
            const entry = (SERVICE_IDS[selectedService] || [])[selectedSvcIdx];
            if (!isNaN(qty) && qty > 0 && entry) estDiv.textContent = `💰 Dự tính: ${calcPriceForSvc(entry, qty).toLocaleString('vi-VN')}đ cho ${qty.toLocaleString()} ${SERVICES[selectedService].unit}`;
            else estDiv.textContent = `💰 Nhập số lượng để xem ước tính`;
        };
        document.getElementById('submitBtn').onclick = async () => {
            const link = document.getElementById('videoLink').value.trim();
            const qty = parseInt(qtyInput.value);
            const entry = (SERVICE_IDS[selectedService] || [])[selectedSvcIdx];
            if (!entry) { showToast("Vui lòng chọn loại dịch vụ!", true); return; }
            if (!link) { showToast("Vui lòng nhập link video", true); return; }
            if (!isValidTikTokUrl(link)) { showToast("Link TikTok không hợp lệ!", true); return; }
            if (isNaN(qty) || qty < entry.min) { showToast(`Tối thiểu ${entry.min.toLocaleString()} ${SERVICES[selectedService].unit}!`, true); return; }
            const note = document.getElementById('orderNote').value.trim();
            if (!isAdmin) {
                const limitCheck = checkSubKeyLimit(selectedService, qty);
                if (!limitCheck.allowed) { showToast(limitCheck.message, true); return; }
            }
            await createOrder(link, qty, selectedService, note, entry);
        };
        document.getElementById('cancelBtn').onclick = () => renderDefaultPanel();
    }
    renderForm();
}

async function createOrder(link, quantity, serviceType, note = '', svcEntry = null) {
    const svcInfo = SERVICES[serviceType];
    const entryName = svcEntry ? svcEntry.name : svcInfo.name;
    const entryId = svcEntry ? svcEntry.id : '';
    showLoading(true, `Đang tạo đơn ${entryName}...`);
    const result = await apiRequest({ key: API_KEY, action: "add", service: String(entryId), link, quantity: String(quantity) });
    showLoading(false);
    if (result && result.order) {
        const orderId = result.order;
        const priceEst = svcEntry ? calcPriceForSvc(svcEntry, quantity) : 0;
        ordersHistory[orderId] = {
            order_id: orderId, link, quantity, service: serviceType,
            service_name: entryName, service_id: entryId, charge: result.charge, note,
            created_at: new Date().toLocaleString('vi-VN'), status: "Pending"
        };
        saveHistory();
        if (!isAdmin) consumeSubKey(serviceType, quantity);
        sendTelegramNotification(`✅ ĐƠN MỚI: ${entryName.toUpperCase()}\n🔰 Order ID: ${orderId}\n🆔 Service ID: ${entryId}${note ? '\n👤 Tên: ' + note : ''}\n📊 SL: ${quantity.toLocaleString()} ${svcInfo.unit}\n🔗 Link: ${link}\n💰 Ước tính: ${priceEst.toLocaleString('vi-VN')}đ`);
        showToast(`✅ Tạo đơn thành công! Mã: ${orderId}`);
        document.getElementById('dynamicPanel').innerHTML = `
            <div class="panel">
                <div class="panel-title">✅ Tạo đơn thành công</div>
                <div class="success-card">
                    <div class="success-icon">🎉</div>
                    <div class="success-title">ĐƠN HÀNG ĐÃ TẠO</div>
                    <div class="success-detail">
                        <div class="success-row"><span class="sk">Order ID</span><span class="sv">#${orderId}</span></div>
                        <div class="success-row"><span class="sk">Dịch vụ</span><span class="sv">${svcInfo.icon} ${entryName}</span></div>
                        <div class="success-row"><span class="sk">Service ID</span><span class="sv">${entryId}</span></div>
                        ${note ? `<div class="success-row"><span class="sk">Tên</span><span class="sv" style="color:var(--yellow)">${note}</span></div>` : ''}
                        <div class="success-row"><span class="sk">Số lượng</span><span class="sv">${quantity.toLocaleString()} ${svcInfo.unit}</span></div>
                        <div class="success-row"><span class="sk">Ước tính</span><span class="sv">${priceEst.toLocaleString('vi-VN')}đ</span></div>
                    </div>
                    <button class="btn btn-purple" id="quickSupportAfterOrder" style="margin-bottom:7px;">🆘 Báo lỗi đơn này</button>
                    <button class="btn btn-secondary" id="backHomeBtn">🏠 Về trang chủ</button>
                </div>
            </div>
        `;
        document.getElementById('backHomeBtn').onclick = () => renderDefaultPanel();
        document.getElementById('quickSupportAfterOrder').onclick = () => {
            showSupportOrderUI();
            setTimeout(() => {
                const inp = document.getElementById('supportOrderId');
                if (inp) inp.value = orderId;
            }, 100);
        };
    } else {
        const errMsg = result?.error || "Không tạo được đơn, kiểm tra số dư hoặc liên hệ admin";
        showToast(`❌ Thất bại: ${errMsg}`, true);
        sendTelegramNotification(`⚠️ LỖI TẠO ĐƠN ${entryName}: ${errMsg}\nLink: ${link}\nSL: ${quantity}`);
    }
}

// ======================= CHECK ĐƠN =======================
function showCheckOrderUI() {
    const panel = document.getElementById('dynamicPanel');
    const lastOrderId = Object.keys(ordersHistory).pop() || '';
    panel.innerHTML = `
        <div class="panel">
            <div class="panel-title">🔍 Kiểm tra trạng thái</div>
            <div class="form-group"><label>🔢 Mã đơn hàng (Order ID)</label><input type="text" id="checkOrderId" placeholder="Nhập Order ID..." value="${lastOrderId}"></div>
            <button class="btn btn-primary" id="checkBtn">🔍 Kiểm tra ngay</button>
            <div id="checkResult"></div>
            <button class="btn btn-secondary" style="margin-top:8px;" id="cancelCheckBtn">↩ Quay lại</button>
        </div>
    `;
    document.getElementById('checkBtn').onclick = async () => {
        const orderId = document.getElementById('checkOrderId').value.trim();
        if (!orderId) { showToast("Vui lòng nhập Order ID", true); return; }
        await fetchOrderStatus(orderId);
    };
    document.getElementById('cancelCheckBtn').onclick = () => renderDefaultPanel();
    document.getElementById('checkOrderId').onkeypress = e => { if (e.key === 'Enter') document.getElementById('checkBtn').click(); };
}

async function fetchOrderStatus(orderId) {
    showLoading(true, `Đang kiểm tra đơn #${orderId}...`);
    const result = await apiRequest({ key: API_KEY, action: "status", order: orderId });
    showLoading(false);
    const resultDiv = document.getElementById('checkResult');
    if (!resultDiv) return;
    if (result && result.status !== undefined) {
        if (ordersHistory[orderId]) { ordersHistory[orderId].status = result.status; saveHistory(); }
        const statusBadge = getStatusBadge(result.status);
        const startCount = result.start_count !== undefined ? Number(result.start_count).toLocaleString() : 'N/A';
        const remains = result.remains !== undefined ? Number(result.remains).toLocaleString() : 'N/A';
        const localOrder = ordersHistory[orderId];
        const teleOrder = telegramOrders.find(o => o.order_id === orderId);
        const svcName = localOrder ? `${SERVICES[localOrder.service]?.icon || ''} ${localOrder.service_name}` : (teleOrder?.service_name || '—');
        const noteDisp = localOrder?.note || teleOrder?.note || null;
        resultDiv.innerHTML = `
            <div class="status-result-card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <span style="font-family:var(--mono); font-size:0.78rem; color:var(--teal);">#${orderId}</span>
                    ${statusBadge}
                </div>
                <div class="status-row"><span class="status-key">Trạng thái</span><span class="status-val">${result.status}</span></div>
                <div class="status-row"><span class="status-key">Dịch vụ</span><span class="status-val">${svcName}</span></div>
                ${noteDisp ? `<div class="status-row"><span class="status-key">Tên</span><span class="status-val" style="color:var(--yellow)">${noteDisp}</span></div>` : ''}
                ${localOrder ? `<div class="status-row"><span class="status-key">Số lượng</span><span class="status-val">${Number(localOrder.quantity).toLocaleString()} ${SERVICES[localOrder.service]?.unit || ''}</span></div>` : ''}
                <div class="status-row"><span class="status-key">Start count</span><span class="status-val">${startCount}</span></div>
                <div class="status-row"><span class="status-key">Còn lại</span><span class="status-val">${remains}</span></div>
                ${localOrder ? `<div class="status-row"><span class="status-key">Tạo lúc</span><span class="status-val" style="font-size:0.68rem;">${localOrder.created_at}</span></div>` : ''}
                ${teleOrder && !localOrder ? `<div class="status-row"><span class="status-key">Tạo lúc</span><span class="status-val" style="font-size:0.68rem;">${teleOrder.date}</span></div>` : ''}
            </div>
            <button class="btn btn-purple" id="supportFromCheckBtn" style="margin-top:8px; font-size:0.82rem; padding:10px;">🆘 Báo lỗi đơn này</button>
        `;
        document.getElementById('supportFromCheckBtn').onclick = () => {
            showSupportOrderUI();
            setTimeout(() => {
                const inp = document.getElementById('supportOrderId');
                if (inp) inp.value = orderId;
            }, 100);
        };
    } else {
        const errMsg = result?.error || "Không tìm thấy đơn hàng này";
        resultDiv.innerHTML = `<div style="text-align:center; padding:14px; color:var(--red); font-size:0.82rem; margin-top:10px; font-family:var(--font);">❌ ${errMsg}</div>`;
        showToast(`❌ ${errMsg}`, true);
    }
}

// ======================= LỊCH SỬ =======================
function showHistoryUI() {
    const panel = document.getElementById('dynamicPanel');
    const orders = Object.values(ordersHistory).reverse();
    if (orders.length === 0) {
        panel.innerHTML = `
            <div class="panel" style="text-align:center; padding:28px 14px;">
                <div style="font-size:1.8rem; margin-bottom:9px;">📭</div>
                <div style="color:var(--text-dim); font-size:0.82rem; font-family:var(--font);">Chưa có đơn nào trên thiết bị này</div>
                <div style="color:var(--text-dim); font-size:0.72rem; margin-top:6px; font-family:var(--font);">Mọi đơn đều lưu trên Telegram (Admin xem qua Quản lý đơn)</div>
                <button class="btn btn-secondary" style="margin-top:14px;" id="backHistory">↩ Quay lại</button>
            </div>`;
        document.getElementById('backHistory').onclick = () => renderDefaultPanel();
        return;
    }
    let html = `<div class="panel"><div class="panel-title">📋 Lịch sử thiết bị này (${orders.length})</div>`;
    for (const d of orders) {
        const svc = SERVICES[d.service] || {};
        html += `
            <div class="history-item" data-oid="${d.order_id}">
                <div class="history-header"><span class="history-id">#${d.order_id}</span>${getStatusBadge(d.status)}</div>
                <div class="history-detail">${svc.icon || ''} ${d.service_name || d.service} · ${Number(d.quantity).toLocaleString()} ${svc.unit || ''}</div>
                ${d.note ? `<div style="font-size:0.7rem; color:var(--yellow); margin-bottom:2px; font-weight:600; font-family:var(--font);">👤 ${d.note}</div>` : ''}
                <div class="history-date" style="margin-bottom:3px;">${d.created_at || ''}</div>
                <div class="history-link">${d.link || ''}</div>
            </div>`;
    }
    html += `
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-top:4px;">
            <button class="btn btn-danger" id="clearHistoryBtn">🗑️ Xóa lịch sử</button>
            <button class="btn btn-secondary" id="backHistoryBtn">↩ Quay lại</button>
        </div>
    </div>`;
    panel.innerHTML = html;
    panel.querySelectorAll('.history-item').forEach(item => {
        item.onclick = () => {
            const oid = item.dataset.oid;
            showCheckOrderUI();
            setTimeout(() => { const inp = document.getElementById('checkOrderId'); if (inp) { inp.value = oid; document.getElementById('checkBtn')?.click(); } }, 100);
        };
    });
    document.getElementById('clearHistoryBtn').onclick = () => {
        if (confirm("Xóa toàn bộ lịch sử đơn hàng trên thiết bị này?")) { ordersHistory = {}; saveHistory(); showHistoryUI(); showToast("Đã xóa lịch sử"); }
    };
    document.getElementById('backHistoryBtn').onclick = () => renderDefaultPanel();
}

// ======================= BALANCE WATCH =======================
let balanceWatchInterval = null;
let prevBalanceVND = null;
function startBalanceWatch() {
    if (balanceWatchInterval) clearInterval(balanceWatchInterval);
    balanceWatchInterval = setInterval(async () => {
        const result = await apiRequest({ key: API_KEY, action: "balance" });
        if (!result || result.balance === undefined) return;
        const curVnd = usdToVnd(result.balance);
        if (prevBalanceVND !== null && curVnd !== null && curVnd !== prevBalanceVND && curVnd > prevBalanceVND) {
            const diff = curVnd - prevBalanceVND;
            sendTelegramNotification(`✅ <b>SỐ DƯ ĐÃ ĐƯỢC CỘNG</b>\n━━━━━━━━━━━━━━\n📊 Số dư cũ: ${prevBalanceVND.toLocaleString('vi-VN')}đ\n📈 Số dư mới: ${curVnd.toLocaleString('vi-VN')}đ\n💰 Số tiền nạp: <b>+${diff.toLocaleString('vi-VN')}đ</b>\n🕐 ${new Date().toLocaleString('vi-VN')}`);
        }
        prevBalanceVND = curVnd;
    }, 30000);
}
