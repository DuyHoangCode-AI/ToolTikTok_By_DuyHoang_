    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
        min-height: 100vh;
        background: var(--bg-dark);
        font-family: var(--font);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px 12px;
        position: relative;
        overflow-x: hidden;
    }

    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
            linear-gradient(rgba(0,229,195,0.035) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,229,195,0.035) 1px, transparent 1px);
        background-size: 36px 36px;
        pointer-events: none;
        z-index: 0;
    }

    body::after {
        content: '';
        position: fixed;
        top: -150px; left: 50%;
        transform: translateX(-50%);
        width: 500px; height: 300px;
        background: radial-gradient(ellipse, rgba(0,229,195,0.07) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
    }

    .glass-card {
        max-width: 480px;
        width: 100%;
        background: var(--bg-card);
        border-radius: 22px;
        border: 1px solid var(--teal-border);
        box-shadow:
            0 0 0 1px rgba(0,229,195,0.04),
            0 24px 48px rgba(0,0,0,0.55),
            inset 0 1px 0 rgba(255,255,255,0.05);
        overflow: hidden;
        position: relative;
        z-index: 1;
    }

    /* HEADER — giống file chính */
    .header {
        padding: 22px 20px 18px;
        text-align: center;
        background: linear-gradient(160deg, #092030 0%, #050f1a 100%);
        border-bottom: 1px solid var(--teal-border);
        position: relative;
        overflow: hidden;
    }

    .header::before {
        content: '';
        position: absolute;
        top: -30px; left: 50%;
        transform: translateX(-50%);
        width: 180px; height: 90px;
        background: radial-gradient(ellipse, rgba(0,229,195,0.18) 0%, transparent 70%);
    }

    .header-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: rgba(251,191,36,0.1);
        border: 1px solid rgba(251,191,36,0.25);
        border-radius: var(--radius-pill);
        padding: 3px 11px;
        font-size: 0.65rem;
        font-weight: 700;
        color: var(--yellow);
        letter-spacing: 1.2px;
        text-transform: uppercase;
        margin-bottom: 10px;
        font-family: var(--mono);
    }

    .header h1 {
        font-size: 1.5rem;
        font-weight: 900;
        color: var(--text-primary);
        letter-spacing: -0.5px;
        line-height: 1.2;
    }

    .header h1 span { color: var(--teal); }

    .header p {
        color: var(--text-muted);
        font-size: 0.78rem;
        margin-top: 5px;
        font-weight: 500;
    }

    .author-tag {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        margin-top: 10px;
        background: rgba(0,0,0,0.35);
        border: 1px solid var(--border);
        border-radius: var(--radius-pill);
        padding: 4px 12px;
        font-size: 0.68rem;
        color: var(--text-muted);
        font-family: var(--mono);
    }

    /* CONTENT */
    .content {
        padding: 36px 20px 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
    }

    /* Gear spinner */
    .gear-wrap {
        position: relative;
        width: 84px; height: 84px;
        display: flex; align-items: center; justify-content: center;
    }

    .ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid transparent;
    }

    .ring-1 {
        border-top-color: var(--teal);
        border-right-color: rgba(0,229,195,0.2);
        animation: spin 1.2s linear infinite;
    }

    .ring-2 {
        inset: 10px;
        border-bottom-color: var(--teal-dim);
        border-left-color: rgba(0,229,195,0.1);
        animation: spin 1.8s linear infinite reverse;
    }

    .gear-emoji {
        font-size: 2.2rem;
        animation: spin 5s linear infinite;
        position: relative;
        z-index: 1;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Status pill */
    .status-pill {
        display: flex;
        align-items: center;
        gap: 9px;
        background: rgba(251,191,36,0.07);
        border: 1px solid rgba(251,191,36,0.2);
        border-radius: var(--radius-pill);
        padding: 9px 20px;
        font-size: 0.82rem;
        font-weight: 800;
        color: var(--yellow);
        letter-spacing: 0.2px;
    }

    .blink-dot {
        width: 8px; height: 8px;
        background: var(--yellow);
        border-radius: 50%;
        flex-shrink: 0;
        animation: blink 1.1s ease-in-out infinite;
    }

    @keyframes blink {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.2; transform: scale(0.7); }
    }

    /* Countdown */
    .countdown-section { width: 100%; }

    .cd-label {
        text-align: center;
        font-size: 0.62rem;
        font-weight: 800;
        color: var(--text-dim);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-family: var(--mono);
        margin-bottom: 10px;
    }

    .cd-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
    }

    .cd-block {
        background: var(--bg-panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 15px 6px 11px;
        text-align: center;
        position: relative;
        overflow: hidden;
    }

    .cd-block::after {
        content: '';
        position: absolute;
        top: 0; left: 15%; right: 15%;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--teal-dim), transparent);
        opacity: 0.45;
    }

    .cd-num {
        font-size: 2rem;
        font-weight: 900;
        font-family: var(--mono);
        color: var(--teal);
        line-height: 1;
        letter-spacing: -2px;
        text-shadow: 0 0 20px rgba(0,229,195,0.28);
    }

    .cd-unit {
        font-size: 0.6rem;
        font-weight: 700;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-top: 6px;
        font-family: var(--mono);
    }

    /* Progress */
    .progress-section { width: 100%; }

    .prog-top {
        display: flex;
        justify-content: space-between;
        font-size: 0.7rem;
        font-weight: 700;
        margin-bottom: 8px;
    }

    .prog-top .pl { color: var(--text-muted); }
    .prog-top .pr { color: var(--teal); font-family: var(--mono); }

    .bar-bg {
        height: 5px;
        background: rgba(0,229,195,0.07);
        border-radius: 999px;
        overflow: hidden;
    }

    .bar-fill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--teal-dim), var(--teal));
        box-shadow: 0 0 8px rgba(0,229,195,0.35);
        transition: width 1s linear;
        width: 0%;
    }

    /* Info rows */
    .info-panel {
        width: 100%;
        background: var(--bg-panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
    }

    .info-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        font-size: 0.78rem;
    }

    .info-row:last-child { border-bottom: none; }
    .info-row .ik { color: var(--text-dim); font-family: var(--mono); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.4px; }
    .info-row .iv { color: var(--text-primary); font-weight: 700; font-size: 0.78rem; text-align: right; }

    .contact-bar {
        text-align: center;
        font-size: 0.68rem;
        color: var(--text-dim);
    }
</style>

<script>
    // ================================
    // ✏️ CHỈ CẦN SỬA PHẦN NÀY
    // ================================
    const END_TIME   = "2026-04-01T20:00:00"; // Thời điểm dự kiến xong
    const START_TIME = null;                   // null = lúc mở trang
    const VERSION    = "v2.4 PRO";
    // ================================

    const end   = new Date(END_TIME);
    const start = START_TIME ? new Date(START_TIME) : new Date();
    const total = end - start;

    const fmt = d => d.toLocaleString('vi-VN', {
        hour: '2-digit', minute: '2-digit',
        day: '2-digit', month: '2-digit', year: 'numeric'
    });

    document.getElementById('startTxt').textContent = fmt(start);
    document.getElementById('endTxt').textContent   = fmt(end);
    document.getElementById('verTxt').textContent   = VERSION;

    function pad(n) { return String(Math.max(0, Math.floor(n))).padStart(2, '0'); }

    function tick() {
        const now  = new Date();
        const left = end - now;

        if (left <= 0) {
            ['cdH','cdM','cdS'].forEach(id => document.getElementById(id).textContent = '00');
            document.getElementById('barFill').style.width = '100%';
            document.getElementById('pctTxt').textContent  = '100%';
            return;
        }

        const h   = Math.floor(left / 3600000);
        const m   = Math.floor((left % 3600000) / 60000);
        const s   = Math.floor((left % 60000) / 1000);
        const pct = Math.min(100, Math.max(0, Math.round(((now - start) / total) * 100)));

        document.getElementById('cdH').textContent       = pad(h);
        document.getElementById('cdM').textContent       = pad(m);
        document.getElementById('cdS').textContent       = pad(s);
        document.getElementById('barFill').style.width   = pct + '%';
        document.getElementById('pctTxt').textContent    = pct + '%';

        setTimeout(tick, 1000);
    }

    tick();
</script>
