<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dịch Vụ TikTok Pro Duy Hoang</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark:#0a0f1a; --bg-card:#111827; --bg-panel:#1e293b;
            --teal:#2dd4bf; --teal-dim:#14b8a6; --teal-glow:rgba(45,212,191,0.15); --teal-border:rgba(45,212,191,0.3);
            --green:#4ade80; --red:#f87171; --yellow:#facc15; --sky:#38bdf8; --orange:#fb923c; --purple:#a78bfa;
            --text-primary:#f3f4f6; --text-muted:#9ca3af; --text-dim:#6b7280;
            --border:rgba(255,255,255,0.1); --radius-lg:18px; --radius-pill:999px;
            --font:'Be Vietnam Pro',sans-serif; --mono:'JetBrains Mono',monospace;
        }
        *{margin:0;padding:0;box-sizing:border-box;min-width:0;-webkit-tap-highlight-color:transparent}
        html{font-size:16px}
        body{min-height:100vh;background:var(--bg-dark);font-family:var(--font);display:flex;justify-content:center;align-items:flex-start;padding:12px 12px 48px;position:relative;overflow-x:hidden}
        body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(45,212,191,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(45,212,191,0.03) 1px,transparent 1px);background-size:36px 36px;pointer-events:none;z-index:0}
        body::after{content:'';position:fixed;top:-150px;left:50%;transform:translateX(-50%);width:500px;height:300px;background:radial-gradient(ellipse,rgba(45,212,191,0.08) 0%,transparent 70%);pointer-events:none;z-index:0}
        .glass-card{max-width:480px;width:100%;background:var(--bg-card);border-radius:22px;border:1px solid var(--teal-border);box-shadow:0 0 0 1px rgba(45,212,191,0.05),0 24px 48px rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.05);overflow:hidden;position:relative;z-index:1;margin-top:12px}
        .header{padding:22px 20px 18px;text-align:center;background:linear-gradient(160deg,#0f172a 0%,#0a0f1a 100%);border-bottom:1px solid var(--teal-border);position:relative;overflow:hidden}
        .header::before{content:'';position:absolute;top:-30px;left:50%;transform:translateX(-50%);width:180px;height:90px;background:radial-gradient(ellipse,rgba(45,212,191,0.2) 0%,transparent 70%)}
        .header-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(45,212,191,0.12);border:1px solid var(--teal-border);border-radius:var(--radius-pill);padding:3px 11px;font-size:0.65rem;font-weight:700;color:var(--teal);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:10px;font-family:var(--mono)}
        .header h1{font-size:1.5rem;font-weight:900;color:var(--text-primary);letter-spacing:-0.5px;line-height:1.2}
        .header h1 span{color:var(--teal)}
        .header p{color:var(--text-muted);font-size:0.78rem;margin-top:5px;font-weight:500}
        .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .hamburger{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:12px;color:var(--text-primary);font-size:1.8rem;cursor:pointer;width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center;transition:all 0.2s;z-index:20}
        .hamburger:hover{background:var(--teal-glow);border-color:var(--teal);color:var(--teal)}
        .menu-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:100;visibility:hidden;opacity:0;transition:opacity 0.2s ease}
        .menu-overlay.show{visibility:visible;opacity:1}
        .menu-drawer{position:fixed;top:0;right:0;width:260px;height:100%;background:rgba(15,23,42,0.98);backdrop-filter:blur(12px);border-left:1px solid var(--teal-border);transform:translateX(100%);transition:transform 0.25s ease;z-index:101;padding:20px 12px;display:flex;flex-direction:column;gap:9px;overflow-y:auto}
        .menu-drawer.show{transform:translateX(0)}
        .menu-btn{display:flex;align-items:center;gap:12px;padding:11px 15px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;color:var(--text-muted);font-size:0.84rem;font-weight:600;font-family:var(--font);cursor:pointer;transition:all 0.18s;width:100%;text-align:left}
        .menu-btn:hover{background:var(--teal-glow);border-color:var(--teal);color:var(--teal)}
        .menu-btn.mb-purple{border-color:rgba(167,139,250,0.3);color:var(--purple);background:rgba(167,139,250,0.08)}
        .menu-btn.mb-purple:hover{background:rgba(167,139,250,0.18);border-color:var(--purple)}
        .menu-btn.mb-green{border-color:rgba(74,222,128,0.3);color:var(--green);background:rgba(74,222,128,0.08)}
        .menu-btn.mb-green:hover{background:rgba(74,222,128,0.18);border-color:var(--green)}
        .menu-btn .icon{font-size:1.15rem}
        .close-drawer{align-self:flex-end;background:none;border:none;color:var(--text-muted);font-size:1.5rem;cursor:pointer;padding:5px}
        .menu-sep{font-size:0.58rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.2px;font-family:var(--mono);padding:0 4px;margin-top:3px}
        .content{padding:16px 14px 20px;overflow:hidden}
        .panel{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 14px;animation:fadeIn 0.2s ease;overflow:hidden}
        @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
        .pt{font-size:0.72rem;font-weight:800;color:var(--teal);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px;display:flex;align-items:center;gap:6px;font-family:var(--mono)}
        .pt::after{content:'';flex:1;height:1px;background:var(--teal-border)}
        .pt.purple{color:var(--purple)}.pt.purple::after{background:rgba(167,139,250,0.3)}
        .pt.green{color:var(--green)}.pt.green::after{background:rgba(74,222,128,0.3)}
        .fg{margin-bottom:12px;width:100%;overflow:hidden}
        label{display:block;margin-bottom:5px;font-weight:700;color:var(--text-muted);font-size:0.7rem;letter-spacing:0.4px;text-transform:uppercase}
        input,select,textarea{width:100%;min-width:0;padding:11px 14px;border-radius:11px;border:1px solid var(--border);background:rgba(0,0,0,0.4);color:var(--text-primary);font-size:0.88rem;font-family:var(--font);outline:none;transition:all 0.18s;display:block;-webkit-appearance:none}
        textarea{resize:vertical;min-height:76px;line-height:1.5}
        input:focus,select:focus,textarea:focus{border-color:var(--teal-border);box-shadow:0 0 0 3px var(--teal-glow);background:rgba(0,0,0,0.55)}
        input::placeholder,textarea::placeholder{color:var(--text-dim)}
        select option{background:#1e293b}
        .btn{width:100%;padding:12px 14px;border:none;border-radius:11px;font-family:var(--font);font-weight:800;font-size:0.88rem;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;justify-content:center;gap:7px;-webkit-appearance:none}
        .btn+.btn{margin-top:7px}
        .btn-primary{background:linear-gradient(135deg,var(--teal-dim),#0f766e);color:#fff;box-shadow:0 4px 14px rgba(20,184,166,0.22)}
        .btn-primary:hover{background:linear-gradient(135deg,var(--teal),var(--teal-dim));transform:translateY(-1px);box-shadow:0 6px 18px rgba(45,212,191,0.28)}
        .btn-sec{background:rgba(255,255,255,0.05);color:var(--text-muted);border:1px solid var(--border)}
        .btn-sec:hover{background:rgba(255,255,255,0.1);color:var(--text-primary)}
        .btn-danger{background:rgba(248,113,113,0.1);color:var(--red);border:1px solid rgba(248,113,113,0.2)}
        .btn-orange{background:linear-gradient(135deg,#ea580c,#c2410c);color:#fff;box-shadow:0 4px 14px rgba(234,88,12,0.22)}
        .btn-orange:hover{background:linear-gradient(135deg,#f97316,#ea580c);transform:translateY(-1px)}
        .btn-purple{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;box-shadow:0 4px 14px rgba(124,58,237,0.25)}
        .btn-purple:hover{background:linear-gradient(135deg,#8b5cf6,#7c3aed);transform:translateY(-1px)}
        .btn-green{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;box-shadow:0 4px 14px rgba(22,163,74,0.25)}
        .btn-green:hover{background:linear-gradient(135deg,#22c55e,#16a34a);transform:translateY(-1px)}
        .btn:active{transform:scale(0.97)!important}
        .svc-tabs{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
        .svc-tab{padding:11px;border-radius:11px;background:rgba(0,0,0,0.3);border:1px solid var(--border);cursor:pointer;text-align:center;transition:all 0.18s;font-size:0.78rem;font-weight:700;color:var(--text-muted)}
        .svc-tab .ti{font-size:1.3rem;display:block;margin-bottom:3px}
        .svc-tab.active{background:var(--teal-glow);border-color:var(--teal);color:var(--teal)}
        .price-est{background:rgba(45,212,191,0.08);border:1px solid var(--teal-border);border-radius:9px;padding:9px 12px;text-align:center;font-size:0.78rem;color:var(--sky);margin:10px 0;font-family:var(--mono)}
        .bal-display{text-align:center;padding:20px 14px}
        .bal-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);font-family:var(--mono);margin-bottom:6px}
        .bal-value{font-size:2.2rem;font-weight:900;color:var(--green);font-family:var(--mono);letter-spacing:-1px;text-shadow:0 0 28px rgba(74,222,128,0.3)}
        .bal-sub{font-size:0.72rem;color:var(--text-dim);margin-top:4px;font-family:var(--mono)}
        .sbadge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:var(--radius-pill);font-size:0.65rem;font-weight:700;font-family:var(--mono);letter-spacing:0.4px}
        .s-pending{background:rgba(250,204,21,0.12);color:var(--yellow);border:1px solid rgba(250,204,21,0.3)}
        .s-progress{background:rgba(56,189,248,0.12);color:var(--sky);border:1px solid rgba(56,189,248,0.3)}
        .s-done{background:rgba(74,222,128,0.12);color:var(--green);border:1px solid rgba(74,222,128,0.3)}
        .s-partial{background:rgba(250,204,21,0.12);color:var(--yellow);border:1px solid rgba(250,204,21,0.3)}
        .s-cancel{background:rgba(248,113,113,0.12);color:var(--red);border:1px solid rgba(248,113,113,0.3)}
        .his-item{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:11px;padding:11px 12px;margin-bottom:7px;transition:border-color 0.18s;cursor:pointer}
        .his-item:hover{border-color:var(--teal-border)}
        .his-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
        .his-id{font-family:var(--mono);font-size:0.76rem;font-weight:700;color:var(--teal)}
        .his-date{font-size:0.64rem;color:var(--text-dim)}
        .his-detail{font-size:0.75rem;color:var(--text-muted);margin-bottom:3px}
        .his-link{font-size:0.64rem;color:var(--text-dim);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .sr-card{background:rgba(0,0,0,0.3);border:1px solid var(--teal-border);border-radius:13px;padding:14px;margin-top:12px}
        .sr-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:0.78rem}
        .sr-row:last-child{border-bottom:none;padding-bottom:0}
        .sr-key{color:var(--text-dim);font-family:var(--mono);font-size:0.68rem;text-transform:uppercase}
        .sr-val{color:var(--text-primary);font-weight:700;text-align:right}
        .ic-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
        .ic{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:11px;padding:11px;text-align:center}
        .ic .ii{font-size:1.3rem;margin-bottom:4px}
        .ic .it{font-size:0.68rem;color:var(--text-muted);font-weight:700}
        .ic .ip{font-size:0.74rem;color:var(--teal);font-family:var(--mono);font-weight:700;margin-top:2px}
        .lo{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);display:flex;flex-direction:column;justify-content:center;align-items:center;gap:14px;z-index:1000;visibility:hidden;opacity:0;transition:opacity 0.18s}
        .spinner{width:40px;height:40px;border:3px solid rgba(45,212,191,0.12);border-top-color:var(--teal);border-radius:50%;animation:spin 0.7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .lo-text{font-size:0.85rem;color:var(--text-muted);font-family:var(--mono)}
        .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(8px);background:rgba(10,20,32,0.96);backdrop-filter:blur(12px);padding:9px 18px;border-radius:var(--radius-pill);color:var(--text-primary);font-weight:600;font-size:0.82rem;z-index:1100;border:1px solid var(--teal-border);pointer-events:none;white-space:nowrap;visibility:hidden;opacity:0;transition:all 0.2s}
        .start-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 16px;gap:18px;min-height:240px}
        .btn-start{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;font-size:1.1rem;font-weight:900;padding:15px 40px;border-radius:var(--radius-pill);border:none;cursor:pointer;box-shadow:0 10px 28px rgba(245,158,11,0.32);transition:all 0.22s;letter-spacing:1.5px;display:inline-flex;align-items:center;gap:9px}
        .btn-start:hover{transform:scale(1.04);box-shadow:0 14px 36px rgba(245,158,11,0.45)}
        .key-box{width:100%;max-width:260px;display:flex;flex-direction:column;gap:7px}
        .shake{animation:shake 0.3s ease-in-out;border-color:var(--red)!important}
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
        .sc{text-align:center;padding:18px 8px}
        .sc-icon{font-size:2.6rem;margin-bottom:8px}
        .sc-title{font-size:1rem;font-weight:900;color:var(--green);margin-bottom:10px}
        .sc-detail{background:rgba(0,0,0,0.3);border-radius:11px;padding:12px;margin-bottom:12px}
        .sc-row{display:flex;justify-content:space-between;padding:5px 0;font-size:0.78rem;border-bottom:1px solid var(--border)}
        .sc-row:last-child{border-bottom:none}
        .sc-row .sk{color:var(--text-dim)}
        .sc-row .sv{color:var(--text-primary);font-weight:700;font-family:var(--mono)}
        .dep-amounts{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
        .amt-btn{padding:10px 6px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:10px;color:var(--text-muted);font-size:0.76rem;font-weight:700;cursor:pointer;text-align:center;transition:all 0.15s}
        .amt-btn:hover,.amt-btn.sel{background:var(--teal-glow);border-color:var(--teal);color:var(--teal)}
        .qr-wrap{text-align:center;padding:14px 0 6px}
        .qr-img{width:200px;height:200px;border-radius:14px;border:2px solid var(--teal-border);object-fit:cover;box-shadow:0 8px 24px rgba(0,0,0,0.5)}
        .binfo{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:11px;padding:10px 12px;margin:10px 0;text-align:center}
        .binfo .bn{font-size:0.7rem;color:var(--text-dim);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:3px}
        .binfo .bv{font-size:0.88rem;font-weight:800;color:var(--text-primary);font-family:var(--mono)}
        .dep-note{font-size:0.7rem;color:var(--text-dim);text-align:center;line-height:1.5;padding:0 4px}
        .dep-note span{color:var(--yellow);font-weight:700}
        ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--teal-border);border-radius:3px}
        .svc-desc{margin:12px 0;padding:12px;background:rgba(45,212,191,0.08);border-radius:12px;text-align:center}
        .svc-desc .dt{font-size:0.8rem;color:var(--text-primary);margin-bottom:6px}
        .svc-desc .dh{color:var(--teal);font-weight:800}
        .admin-bar{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:8px;border-top:1px solid var(--border);font-size:0.7rem;color:var(--text-dim)}
        .issue-tabs{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
        .it-tab{padding:10px 8px;border-radius:10px;background:rgba(0,0,0,0.3);border:1px solid var(--border);cursor:pointer;text-align:center;transition:all 0.18s;font-size:0.76rem;font-weight:700;color:var(--text-muted)}
        .it-tab .iti{font-size:1.1rem;display:block;margin-bottom:3px}
        .it-tab.active{background:rgba(167,139,250,0.12);border-color:rgba(167,139,250,0.4);color:var(--purple)}
        .tele-item{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:11px;padding:11px 12px;margin-bottom:7px;cursor:pointer;transition:border-color 0.18s}
        .tele-item:hover{border-color:var(--teal-border)}
        .ti-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
        .ti-id{font-family:var(--mono);font-size:0.76rem;font-weight:700;color:var(--teal)}
        .ti-det{font-size:0.75rem;color:var(--text-muted);margin-bottom:2px}
        .ti-link{font-size:0.63rem;color:var(--text-dim);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .ti-note{font-size:0.7rem;color:var(--yellow);font-weight:600;margin-bottom:2px}
        .info-note{background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);border-radius:9px;padding:9px 12px;font-size:0.73rem;color:var(--sky);margin-bottom:12px;line-height:1.5}
        .info-note-p{background:rgba(167,139,250,0.08);border:1px solid rgba(167,139,250,0.2);border-radius:9px;padding:9px 12px;font-size:0.73rem;color:var(--purple);margin-bottom:12px;line-height:1.5}
        .ref-btn{background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.25);border-radius:9px;padding:8px 14px;color:var(--sky);font-size:0.78rem;font-weight:700;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;gap:6px;margin-bottom:12px}
        .ref-btn:hover{background:rgba(56,189,248,0.18)}
        .key-item{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
        .key-name{font-size:0.85rem;font-weight:800;color:var(--teal);font-family:var(--mono);margin-bottom:6px}
        .key-stat{font-size:0.75rem;color:var(--text-muted);margin-bottom:3px;display:flex;justify-content:space-between;align-items:center}
        .key-stat .ksv{font-family:var(--mono);font-size:0.72rem;color:var(--text-primary);font-weight:700}
        .kprog{width:100%;height:4px;background:rgba(255,255,255,0.08);border-radius:4px;margin-top:2px;margin-bottom:6px;overflow:hidden}
        .kprog-bar{height:100%;background:linear-gradient(90deg,var(--teal-dim),var(--teal));border-radius:4px;transition:width 0.4s ease}
        .sup-item{background:rgba(0,0,0,0.3);border:1px solid rgba(167,139,250,0.2);border-radius:11px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color 0.18s}
        .sup-item:hover{border-color:rgba(167,139,250,0.45)}
        .sup-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
        .sup-id{font-family:var(--mono);font-size:0.76rem;font-weight:700;color:var(--purple)}
        .sup-issue{font-size:0.7rem;color:var(--yellow);font-weight:700;background:rgba(250,204,21,0.08);border-radius:6px;padding:3px 8px;display:inline-block;margin-bottom:4px}
        .sup-det{font-size:0.74rem;color:var(--text-muted);margin-bottom:2px}
        .sup-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:7px}
        .sup-stat{background:rgba(0,0,0,0.3);border-radius:7px;padding:5px 6px;text-align:center}
        .sup-stat .ssl{font-size:0.52rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;font-family:var(--mono)}
        .sup-stat .ssv{font-size:0.7rem;font-weight:700;color:var(--text-primary);font-family:var(--mono)}
        .unread-dot{width:7px;height:7px;background:var(--red);border-radius:50%;display:inline-block;margin-left:5px;animation:pulse 1.5s ease-in-out infinite;vertical-align:middle}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
        .act-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:8px}

// Gửi / ghi đè 1 file JSON cố định: xoá message cũ rồi gửi lại
async function upsertTeleDB(dbKey, arr, captionStr){
    // Xoá message cũ nếu biết ID
    if(dbMsgIds[dbKey]){
        try{await fetch(`https://api.telegram.org/bot${TELE_TOKEN}/deleteMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:TELE_CHAT_ID,message_id:dbMsgIds[dbKey]})});}catch(e){}
    }
    // Upload file JSON mới
    const blob=new Blob([JSON.stringify(arr,null,2)],{type:'application/json'});
    const fd=new FormData();
    fd.append('chat_id',TELE_CHAT_ID);
    fd.append('document',blob,captionStr.replace(/[\[\] ]/g,'_').replace(/__+/g,'_')+'.json');
    fd.append('caption',captionStr);
    try{
        const res=await fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendDocument`,{method:'POST',body:fd});
        const data=await res.json();
        if(data.ok&&data.result) dbMsgIds[dbKey]=data.result.message_id;
    }catch(e){}
}

// Tải nội dung 1 document từ Telegram
async function fetchTeleDocument(fileId){
    try{
        const r1=await fetch(`https://api.telegram.org/bot${TELE_TOKEN}/getFile?file_id=${fileId}`);
        const d1=await r1.json();if(!d1.ok)return null;
        const r2=await fetch(`https://api.telegram.org/file/bot${TELE_TOKEN}/${d1.result.file_path}`);
        return await r2.json();
    }catch(e){return null;}
}

// Tải toàn bộ 3 DB từ Telegram (tìm message mới nhất có caption khớp)
async function loadAllDBFromTelegram(){
    try{
        const res=await fetch(`https://api.telegram.org/bot${TELE_TOKEN}/getUpdates?limit=200&offset=-200`);
        const data=await res.json();
        if(!data.ok)return;
        const updates=data.result;
        // Tìm message_id mới nhất cho mỗi caption
        const found={orders:null,deposits:null,supports:null};
        for(const upd of updates){
            const msg=upd.message||upd.channel_post;
            if(!msg||!msg.document)continue;
            const cap=msg.caption||'';
            if(cap===JSON_CAPTION.ORDERS) found.orders={msgId:msg.message_id,fileId:msg.document.file_id};
            if(cap===JSON_CAPTION.DEPOSITS) found.deposits={msgId:msg.message_id,fileId:msg.document.file_id};
            if(cap===JSON_CAPTION.SUPPORTS) found.supports={msgId:msg.message_id,fileId:msg.document.file_id};
        }
        // Download từng file
        if(found.orders){dbMsgIds.orders=found.orders.msgId;const d=await fetchTeleDocument(found.orders.fileId);if(Array.isArray(d))cachedOrders=d;}
        if(found.deposits){dbMsgIds.deposits=found.deposits.msgId;const d=await fetchTeleDocument(found.deposits.fileId);if(Array.isArray(d))cachedDeposits=d;}
        if(found.supports){dbMsgIds.supports=found.supports.msgId;const d=await fetchTeleDocument(found.supports.fileId);if(Array.isArray(d))cachedSupports=d;}
    }catch(e){}
}

function isValidTikTokUrl(u){return[/^https?:\/\/(?:www\.)?tiktok\.com\/@[^\/]+\/video\/\d+/,/^https?:\/\/(?:vm|vt)\.tiktok\.com\/\w+\/?$/,/^https?:\/\/(?:www\.)?tiktok\.com\/t\/\w+\/?$/].some(p=>p.test(u.trim()));}

function getStatusBadge(s){

    if(st==='completed')return`<span class="sbadge s-done">✓ Hoàn thành</span>`;
    if(st==='in progress'||st==='inprogress'||st==='processing')return`<span class="sbadge s-progress">⟳ Đang chạy</span>`;
    if(st==='partial')return`<span class="sbadge s-partial">◑ Một phần</span>`;
    if(st==='cancelled'||st==='canceled')return`<span class="sbadge s-cancel">✕ Đã hủy</span>`;
    return`<span class="sbadge s-pending">⏳ Chờ xử lý</span>`;

function checkSubKeyLimit(svcType,qty){
    if(isAdmin)return{allowed:true};
    const u=subKeyUsage[currentUserKey];if(!u)return{allowed:false,message:"Key không hợp lệ!"};
    const ki=SUB_KEYS.find(k=>k.key===currentUserKey);if(!ki)return{allowed:false,message:"Key lỗi!"};
    if(svcType==='view'){const r=ki.max_views-u.views_used;if(r<qty)return{allowed:false,message:`Còn ${r.toLocaleString()} view, không đủ ${qty.toLocaleString()}`};}
    if(svcType==='like'){const r=ki.max_likes-u.likes_used;if(r<qty)return{allowed:false,message:`Còn ${r.toLocaleString()} tim, không đủ ${qty.toLocaleString()}`};}
    return{allowed:true};
}
function consumeSubKey(svcType,qty){
    if(isAdmin)return;
    const u=subKeyUsage[currentUserKey];
    if(svcType==='view')u.views_used+=qty;
    else if(svcType==='like')u.likes_used+=qty;
    saveSubKeyUsage();
}
function getRemainingLimits(){
    if(isAdmin)return{views:'∞',likes:'∞'};
    const ki=SUB_KEYS.find(k=>k.key===currentUserKey),u=subKeyUsage[currentUserKey];
    if(!ki||!u)return{views:0,likes:0};
    return{views:ki.max_views-u.views_used,likes:ki.max_likes-u.likes_used};
}
function parseDate(str){
    // "dd/mm/yyyy, hh:mm:ss" hoặc ISO
    if(!str)return null;
    try{
        if(str.includes('/')){
            const[datePart,timePart]=(str||'').split(', ');
            if(!datePart)return null;
            const[d,m,y]=datePart.split('/');
            return new Date(`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}${timePart?'T'+timePart:''}`);
        }
        return new Date(str);
    }catch(e){return null;}
}
function filterByDays(arr,days,dateField='time'){
    const cutoff=new Date(Date.now()-days*24*60*60*1000);
    return arr.filter(item=>{
        const d=parseDate(item[dateField]);
        return d&&d>=cutoff;
    });
}

        showLoading(true,"Đang khởi động...");
        setTimeout(()=>{showLoading(false);document.getElementById('startBtn').style.display='none';document.getElementById('keySection').style.display='flex';document.getElementById('secretKey').focus();showToast("🔐 Nhập mã kích hoạt để tiếp tục");},1200);
    };
    const verify=()=>{
        const key=document.getElementById('secretKey').value.trim();
        if(key===ADMIN_KEY){
            showLoading(true,"Xác thực admin...");
            setTimeout(async()=>{
                isAuthenticated=true;currentUserKey=ADMIN_KEY;isAdmin=true;
                showLoading(true,"Đang tải dữ liệu từ Telegram...");
                await loadAllDBFromTelegram();
                showLoading(false);
                renderMainMenu();startBalanceWatch();
                showToast("✅ Admin đăng nhập thành công");
            },400);return;
        }
        const ski=SUB_KEYS.find(k=>k.key===key);
        if(ski){
            const u=subKeyUsage[ski.key];
            if(u.logins_used>=ski.max_logins){showToast("❌ Key đã hết lượt!",true);const inp=document.getElementById('secretKey');inp.value='';inp.classList.add('shake');setTimeout(()=>inp.classList.remove('shake'),400);return;}
            showLoading(true,"Xác thực key...");
            setTimeout(()=>{showLoading(false);isAuthenticated=true;currentUserKey=ski.key;isAdmin=false;subKeyUsage[ski.key].logins_used++;saveSubKeyUsage();renderMainMenu();startBalanceWatch();showToast(`✅ Đăng nhập (${ski.label})`);},700);
        }else{
            const inp=document.getElementById('secretKey');inp.classList.add('shake');showToast("❌ Mã không đúng!",true);setTimeout(()=>inp.classList.remove('shake'),400);inp.value='';inp.focus();
        }
    };
    document.getElementById('submitKeyBtn').onclick=verify;
    document.getElementById('secretKey').onkeypress=e=>{if(e.key==='Enter')verify();};
}

async function createOrder(link,qty,svcType,note='',entry=null){

    showLoading(false);
    if(result&&result.order){
        const orderId=result.order,price=entry?calcPrice(entry,qty):0,timeNow=new Date().toLocaleString('vi-VN');
        ordersHistory[orderId]={order_id:orderId,link,quantity:qty,service:svcType,service_name:entryName,service_id:entryId,charge:result.charge,note,created_at:timeNow,status:"Pending"};
        saveHistory();
        if(!isAdmin)consumeSubKey(svcType,qty);
        const orderData={id:Date.now(),order_id:orderId,service_name:entryName,service_id:entryId,service_type:svcType,quantity:qty,link,note,price_estimate:price,time:timeNow,status:'pending',key_used:isAdmin?'ADMIN':currentUserKey};

        await sendTeleText(msg);
        await dbAddOrder(orderData);
        showLoading(false);
        showToast(`✅ Tạo đơn #${orderId}`);
        document.getElementById('dynamicPanel').innerHTML=`
            <div class="panel"><div class="pt">✅ Tạo đơn thành công</div>
            <div class="sc"><div class="sc-icon">🎉</div><div class="sc-title">ĐƠN HÀNG ĐÃ TẠO</div>

                <div class="sc-row"><span class="sk">Số lượng</span><span class="sv">${qty.toLocaleString()} ${si.unit}</span></div>
                <div class="sc-row"><span class="sk">Ước tính</span><span class="sv">${price.toLocaleString('vi-VN')}đ</span></div>
            </div>

            <button class="btn btn-sec" id="backHome">🏠 Về trang chủ</button>
            </div></div>
        `;
        document.getElementById('backHome').onclick=()=>renderDefaultPanel();
        document.getElementById('supAfterOrder').onclick=()=>{showSupportOrderUI();setTimeout(()=>{const inp=document.getElementById('supportOrderId');if(inp)inp.value=orderId;},100);};
    }else{
        const err=result?.error||"Không tạo được đơn";showToast(`❌ ${err}`,true);
        await sendTeleText(`⚠️ LỖI TẠO ĐƠN ${entryName}: ${err}\nLink: ${link}\nSL: ${qty}`);
    }

            if(orderInfo?.remains!==undefined)msg+=`\n⏳ Còn lại: ${Number(orderInfo.remains).toLocaleString()}`;
            if(note)msg+=`\n📝 ${note}`;
            msg+=`\n🕐 ${timeNow}`;

// ========================= ADMIN: DOANH THU =========================
function showRevenueUI(){
    const panel=document.getElementById('dynamicPanel');
    let selPeriod=1; // ngày
    function renderRevenue(){
        const days=selPeriod;
        const periodLabel={1:'Hôm nay',7:'7 ngày',30:'30 ngày',365:'1 năm'}[days]||`${days} ngày`;

        // --- Doanh thu nạp tiền: tổng các deposit đã confirmed (status==='confirmed') trong kỳ ---
        const depAll=filterByDays(cachedDeposits,days,'time');
        const depConfirmed=depAll.filter(d=>d.status==='confirmed');
        const depPending=depAll.filter(d=>d.status==='pending');
        const totalDeposit=depConfirmed.reduce((s,d)=>s+Number(d.amount||0),0);
        const totalDepositPending=depPending.reduce((s,d)=>s+Number(d.amount||0),0);
        const depCount=depConfirmed.length;

        // --- Doanh thu tạo đơn: tổng tiền ước tính, số view, số tim ---
        const ordersAll=filterByDays(cachedOrders,days,'time');
        const viewOrders=ordersAll.filter(o=>o.service_type==='view');
        const likeOrders=ordersAll.filter(o=>o.service_type==='like');
        const totalViews=viewOrders.reduce((s,o)=>s+Number(o.quantity||0),0);
        const totalLikes=likeOrders.reduce((s,o)=>s+Number(o.quantity||0),0);
        const totalOrderRevenue=ordersAll.reduce((s,o)=>s+Number(o.price_estimate||0),0);
        const totalOrders=ordersAll.length;

        // --- Grand total ---
        const grandTotal=totalDeposit+totalOrderRevenue;

        panel.innerHTML=`
            <div class="panel">
                <div class="pt green">📊 Doanh thu</div>
                <div class="rev-period-tabs">
                    ${[1,7,30,365].map(d=>`<div class="rev-tab ${selPeriod===d?'active':''}" data-days="${d}">${d===1?'Hôm nay':d===7?'7 ngày':d===30?'30 ngày':'1 năm'}</div>`).join('')}
                </div>

                <div class="rev-big">
                    <div class="rev-big-label">TỔNG DOANH THU · ${periodLabel.toUpperCase()}</div>
                    <div class="rev-big-val">${grandTotal.toLocaleString('vi-VN')}đ</div>
                </div>

                <!-- Nạp tiền -->
                <div class="rev-section">
                    <div class="rev-section-title">💳 Doanh thu nạp tiền</div>
                    <div class="rev-row">
                        <span class="rev-key">Tổng nạp xác nhận</span>
                        <span class="rev-val" style="color:var(--green);">${totalDeposit.toLocaleString('vi-VN')}đ</span>
                    </div>
                    <div class="rev-row">
                        <span class="rev-key">Số lần nạp</span>
                        <span class="rev-val">${depCount} lần</span>
                    </div>
                    <div class="rev-row">
                        <span class="rev-key">Đang chờ xác nhận</span>
                        <span class="rev-val" style="color:var(--yellow);">${totalDepositPending.toLocaleString('vi-VN')}đ (${depPending.length} YC)</span>
                    </div>
                    ${depCount>0?`<div class="rev-row"><span class="rev-key">Trung bình/lần</span><span class="rev-val" style="color:var(--sky);">${Math.round(totalDeposit/depCount).toLocaleString('vi-VN')}đ</span></div>`:''}
                </div>

                <!-- Tạo đơn -->
                <div class="rev-section">
                    <div class="rev-section-title">🚀 Doanh thu tạo đơn</div>
                    <div class="rev-row">
                        <span class="rev-key">Tổng tiền ước tính</span>
                        <span class="rev-val" style="color:var(--teal);">${totalOrderRevenue.toLocaleString('vi-VN')}đ</span>
                    </div>
                    <div class="rev-row">
                        <span class="rev-key">Tổng đơn</span>
                        <span class="rev-val">${totalOrders} đơn</span>
                    </div>
                    <div class="rev-metric-grid">
                        <div class="rev-metric">
                            <div class="rm-icon">👀</div>
                            <div class="rm-label">Tổng View</div>
                            <div class="rm-val" style="color:var(--sky);">${totalViews>=1000?(totalViews/1000).toFixed(1)+'K':totalViews.toLocaleString()}</div>
                        </div>
                        <div class="rev-metric">
                            <div class="rm-icon">❤️</div>
                            <div class="rm-label">Tổng Tim</div>
                            <div class="rm-val" style="color:var(--red);">${totalLikes>=1000?(totalLikes/1000).toFixed(1)+'K':totalLikes.toLocaleString()}</div>
                        </div>
                        <div class="rev-metric">
                            <div class="rm-icon">📦</div>
                            <div class="rm-label">Đơn View</div>
                            <div class="rm-val" style="color:var(--sky);">${viewOrders.length}</div>
                        </div>
                        <div class="rev-metric">
                            <div class="rm-icon">💝</div>
                            <div class="rm-label">Đơn Tim</div>
                            <div class="rm-val" style="color:var(--red);">${likeOrders.length}</div>
                        </div>
                    </div>
                    ${totalOrders>0?`<div class="rev-row" style="margin-top:8px;"><span class="rev-key">Trung bình/đơn</span><span class="rev-val" style="color:var(--sky);">${Math.round(totalOrderRevenue/totalOrders).toLocaleString('vi-VN')}đ</span></div>`:''}
                </div>

                ${cachedOrders.length===0&&cachedDeposits.length===0?`<div class="info-note">⚠️ Chưa có dữ liệu. Vào Quản lý đơn hoặc Quản lý tiền để tải từ Telegram trước.</div>`:''}

                <button class="btn btn-sec" id="backRevenue">↩ Quay lại</button>
            </div>
        `;
        panel.querySelectorAll('.rev-tab').forEach(t=>{t.onclick=()=>{selPeriod=parseInt(t.dataset.days);renderRevenue();};});
        document.getElementById('backRevenue').onclick=()=>renderDefaultPanel();
    }
    // Nếu cache trống thì tải trước
    if(cachedOrders.length===0&&cachedDeposits.length===0){
        showLoading(true,"Đang tải dữ liệu...");
        loadAllDBFromTelegram().then(()=>{showLoading(false);renderRevenue();});
    } else {
        renderRevenue();
    }
}

    if(deps.length===0){c.innerHTML=`<div style="text-align:center;padding:20px;color:var(--text-dim);font-size:0.82rem;">📭 Không có yêu cầu nào</div>`;return;}
    const pending=deps.filter(d=>d.status==='pending');
    const confirmed=deps.filter(d=>d.status==='confirmed');
    let html=`<div style="font-size:0.7rem;color:var(--text-dim);margin-bottom:10px;">📋 ${deps.length} · ⏳ ${pending.length} chờ · ✅ ${confirmed.length} xác nhận</div>`;
    if(pending.length>0){
        html+=`<div style="font-size:0.68rem;color:var(--yellow);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;">⏳ Chờ xử lý (${pending.length})</div>`;
        pending.forEach(d=>{
            html+=`<div style="background:rgba(0,0,0,0.3);border:1px solid rgba(250,204,21,0.2);border-radius:10px;padding:12px;margin-bottom:8px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
                    <span style="font-size:0.85rem;font-weight:800;color:var(--text-primary);">👤 ${d.name}</span>
                    <span class="dep-tag dep-pending-tag">⏳ Chờ</span>
                </div>
                <div style="font-size:1rem;font-weight:900;color:var(--green);font-family:var(--mono);">+${Number(d.amount).toLocaleString('vi-VN')}đ</div>
                <div style="font-size:0.72rem;color:var(--text-muted);margin-top:3px;">📝 ${d.note||''}</div>
                <div style="font-size:0.68rem;color:var(--text-dim);margin-top:3px;">🕐 ${d.time||''}</div>
                <button class="btn btn-primary" style="margin-top:10px;font-size:0.82rem;padding:10px;" data-dep-id="${d.id}">✅ Xác nhận đã nhận tiền</button>
            </div>`;
        });
    }
    if(confirmed.length>0){
        html+=`<div style="font-size:0.68rem;color:var(--green);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.8px;margin:10px 0 6px;">✅ Đã xác nhận (${confirmed.length})</div>`;
        confirmed.forEach(d=>{
            html+=`<div style="background:rgba(0,0,0,0.3);border:1px solid rgba(74,222,128,0.15);border-radius:10px;padding:10px 12px;margin-bottom:7px;opacity:0.75;display:flex;justify-content:space-between;align-items:center;">
                <div><div style="font-size:0.82rem;font-weight:700;color:var(--text-primary);">👤 ${d.name}</div><div style="font-size:0.78rem;color:var(--green);font-family:var(--mono);font-weight:800;">+${Number(d.amount).toLocaleString('vi-VN')}đ</div><div style="font-size:0.64rem;color:var(--text-dim);">${d.time||''}</div></div>
                <span class="dep-tag dep-done-tag">✅ Xong</span>
            </div>`;
        });
    }
    c.innerHTML=html;
    c.querySelectorAll('[data-dep-id]').forEach(btn=>{
        btn.onclick=async()=>{
            const id=btn.dataset.depId;
            btn.textContent='⏳ Đang cập nhật...';btn.disabled=true;
            showLoading(true,"Đang cập nhật DB...");
            await dbUpdateDepositStatus(id,'confirmed');
            showLoading(false);
            showToast("✅ Đã xác nhận!");
            renderAdminMoney();
        };
    });
}

// ========================= ADMIN: QUẢN LÝ HỖ TRỢ =========================
async function showManageSupportUI(){
    const panel=document.getElementById('dynamicPanel');
    panel.innerHTML=`<div class="panel"><div class="pt purple">🎫 Quản lý hỗ trợ</div><div class="info-note-p">📁 1 file JSON duy nhất trên Telegram. Cập nhật trạng thái sẽ ghi đè file.</div><button class="ref-btn" style="background:rgba(167,139,250,0.1);border-color:rgba(167,139,250,0.25);color:var(--purple);" id="refreshSupports">🔄 Tải lại từ Telegram</button><div id="supContainer"><div style="text-align:center;padding:20px;color:var(--text-dim);font-size:0.82rem;">⏳ Đang tải...</div></div><button class="btn btn-sec" style="margin-top:8px;" id="backSupports">↩ Quay lại</button></div>`;
    document.getElementById('backSupports').onclick=()=>renderDefaultPanel();
    document.getElementById('refreshSupports').onclick=async()=>{showLoading(true,"Đang tải...");await loadAllDBFromTelegram();showLoading(false);renderAdminSupports();};
    renderAdminSupports();
}
function renderAdminSupports(){
    const c=document.getElementById('supContainer');if(!c)return;
    const sups=cachedSupports;
    updateDrawerButtons();
    if(sups.length===0){c.innerHTML=`<div style="text-align:center;padding:20px;color:var(--text-dim);font-size:0.82rem;"><div style="font-size:2rem;margin-bottom:8px;">🎉</div>Không có yêu cầu hỗ trợ nào</div>`;return;}
    const newC=sups.filter(s=>s.status==='new').length;
    const procC=sups.filter(s=>s.status==='processing').length;
    const doneC=sups.filter(s=>s.status==='done').length;
    let html=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:14px;">
        <div style="background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:9px;padding:9px;text-align:center;"><div style="font-size:0.58rem;color:var(--red);font-family:var(--mono);text-transform:uppercase;">Mới</div><div style="font-size:1.3rem;font-weight:900;color:var(--red);font-family:var(--mono);">${newC}</div></div>
        <div style="background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);border-radius:9px;padding:9px;text-align:center;"><div style="font-size:0.58rem;color:var(--sky);font-family:var(--mono);text-transform:uppercase;">Xử lý</div><div style="font-size:1.3rem;font-weight:900;color:var(--sky);font-family:var(--mono);">${procC}</div></div>
        <div style="background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.2);border-radius:9px;padding:9px;text-align:center;"><div style="font-size:0.58rem;color:var(--green);font-family:var(--mono);text-transform:uppercase;">Xong</div><div style="font-size:1.3rem;font-weight:900;color:var(--green);font-family:var(--mono);">${doneC}</div></div>
    </div>`;
    sups.forEach(s=>{
        html+=`<div class="sup-item" data-sid="${s.id}" data-oid="${s.order_id}">
            <div class="sup-hdr"><span class="sup-id">#${s.order_id}</span>${getSupportBadge(s.status)}</div>
            <div><span class="sup-issue">${s.issue_label||getIssueLabel(s.issue)}</span><span style="font-size:0.7rem;color:var(--yellow);font-weight:700;margin-left:6px;">👤 ${s.name}</span></div>
            ${s.service_name?`<div class="sup-det">🎯 ${s.service_name}${s.quantity?' · '+Number(s.quantity).toLocaleString():''}</div>`:''}
            ${s.order_status?`<div class="sup-det">📌 Trạng thái: <strong>${s.order_status}</strong></div>`:''}
            <div class="sup-stats">
                <div class="sup-stat"><div class="ssl">Bắt đầu</div><div class="ssv">${s.start_count!==null&&s.start_count!==undefined?Number(s.start_count).toLocaleString():'—'}</div></div>
                <div class="sup-stat"><div class="ssl">Còn lại</div><div class="ssv">${s.remains!==null&&s.remains!==undefined?Number(s.remains).toLocaleString():'—'}</div></div>
                <div class="sup-stat"><div class="ssl">Đặt</div><div class="ssv">${s.quantity?Number(s.quantity).toLocaleString():'—'}</div></div>
            </div>
            ${s.link?`<div style="font-size:0.62rem;color:var(--text-dim);font-family:var(--mono);margin-top:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${s.link}</div>`:''}
            ${s.note?`<div style="font-size:0.7rem;color:var(--text-muted);margin-top:3px;line-height:1.4;">📝 ${s.note}</div>`:''}
            <div style="font-size:0.63rem;color:var(--text-dim);margin-top:4px;">🕐 ${s.time}</div>
            <div class="act-row">
                <button class="act-btn" data-sid="${s.id}" data-action="processing" style="border-color:rgba(56,189,248,0.3);background:rgba(56,189,248,0.08);color:var(--sky);">⚙️ Xử lý</button>
                <button class="act-btn" data-sid="${s.id}" data-action="done" style="border-color:rgba(74,222,128,0.3);background:rgba(74,222,128,0.08);color:var(--green);">✅ Xong</button>
                <button class="act-btn" data-sid="${s.id}" data-action="new" style="border-color:rgba(250,204,21,0.3);background:rgba(250,204,21,0.06);color:var(--yellow);">🔄 Mới</button>
            </div>
        </div>`;
    });
    c.innerHTML=html;
    c.querySelectorAll('.act-btn').forEach(btn=>{
        btn.onclick=async(e)=>{
            e.stopPropagation();
            const sid=btn.dataset.sid,action=btn.dataset.action;
            btn.textContent='⏳';btn.disabled=true;
            showLoading(true,"Đang cập nhật...");
            await dbUpdateSupportStatus(sid,action);
            showLoading(false);
            showToast(action==='done'?'✅ Đã xong':action==='processing'?'⚙️ Đang xử lý':'🔄 Đặt lại mới');
            renderAdminSupports();
        };
    });
    c.querySelectorAll('.sup-item').forEach(item=>{
        item.onclick=(e)=>{
            if(e.target.closest('.act-btn'))return;
            const oid=item.dataset.oid;if(!oid)return;
            showCheckOrderUI();
            setTimeout(()=>{const inp=document.getElementById('checkOrderId');if(inp){inp.value=oid;document.getElementById('checkBtn')?.click();}},100);
        };
    });
}

// ========================= BALANCE WATCH =========================
function startBalanceWatch(){
    if(balanceWatchInterval)clearInterval(balanceWatchInterval);
    balanceWatchInterval=setInterval(async()=>{
        const r=await apiRequest({key:API_KEY_V,action:"balance"});
        if(!r||r.balance===undefined)return;
        const cur=usdToVnd(r.balance);
        if(prevBalanceVND!==null&&cur!==null&&cur>prevBalanceVND){
            const diff=cur-prevBalanceVND;
            await sendTeleText(`✅ <b>SỐ DƯ TĂNG</b>\n📊 Cũ: ${prevBalanceVND.toLocaleString('vi-VN')}đ → Mới: ${cur.toLocaleString('vi-VN')}đ\n💰 +${diff.toLocaleString('vi-VN')}đ\n🕐 ${new Date().toLocaleString('vi-VN')}`);
        }
        prevBalanceVND=cur;
    },30000);
}
