<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dịch Vụ TikTok Pro Duy Hoang</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0f1a; --bg-card: #111827; --bg-panel: #1e293b;
            --teal: #2dd4bf; --teal-dim: #14b8a6; --teal-glow: rgba(45,212,191,0.15); --teal-border: rgba(45,212,191,0.3);
            --green: #4ade80; --red: #f87171; --yellow: #facc15; --sky: #38bdf8; --orange: #fb923c; --purple: #a78bfa;
            --text-primary: #f3f4f6; --text-muted: #9ca3af; --text-dim: #6b7280;
            --border: rgba(255,255,255,0.1); --radius-lg: 18px; --radius-pill: 999px;
            --font: 'Be Vietnam Pro', sans-serif; --mono: 'JetBrains Mono', monospace;
        }
        * { margin:0; padding:0; box-sizing:border-box; min-width:0; -webkit-tap-highlight-color:transparent; }
        html { font-size:16px; }
        body {
            min-height:100vh; background:var(--bg-dark); font-family:var(--font);
            display:flex; justify-content:center; align-items:flex-start;
            padding:12px 12px 48px; position:relative; overflow-x:hidden;
        }
        body::before {
            content:''; position:fixed; inset:0;
            background-image: linear-gradient(rgba(45,212,191,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(45,212,191,0.03) 1px,transparent 1px);
            background-size:36px 36px; pointer-events:none; z-index:0;
        }
        body::after {
            content:''; position:fixed; top:-150px; left:50%; transform:translateX(-50%);
            width:500px; height:300px;
            background:radial-gradient(ellipse,rgba(45,212,191,0.08) 0%,transparent 70%);
            pointer-events:none; z-index:0;
        }
        .glass-card {
            max-width:480px; width:100%; background:var(--bg-card); border-radius:22px;
            border:1px solid var(--teal-border);
            box-shadow:0 0 0 1px rgba(45,212,191,0.05),0 24px 48px rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.05);
            overflow:hidden; position:relative; z-index:1; margin-top:12px;
        }
        .header {
            padding:22px 20px 18px; text-align:center;
            background:linear-gradient(160deg,#0f172a 0%,#0a0f1a 100%);
            border-bottom:1px solid var(--teal-border); position:relative; overflow:hidden;
        }
        .header::before {
            content:''; position:absolute; top:-30px; left:50%; transform:translateX(-50%);
            width:180px; height:90px; background:radial-gradient(ellipse,rgba(45,212,191,0.2) 0%,transparent 70%);
        }
        .header-badge {
            display:inline-flex; align-items:center; gap:5px;
            background:rgba(45,212,191,0.12); border:1px solid var(--teal-border);
            border-radius:var(--radius-pill); padding:3px 11px;
            font-size:0.65rem; font-weight:700; color:var(--teal);
            letter-spacing:1.2px; text-transform:uppercase; margin-bottom:10px; font-family:var(--mono);
        }
        .header h1 { font-size:1.5rem; font-weight:900; color:var(--text-primary); letter-spacing:-0.5px; line-height:1.2; font-family:var(--font); }
        .header h1 span { color:var(--teal); }
        .header p { color:var(--text-muted); font-size:0.78rem; margin-top:5px; font-weight:500; }
        .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
        .hamburger {
            background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:12px;
            color:var(--text-primary); font-size:1.8rem; cursor:pointer; padding:5px;
            width:40px; height:40px; display:inline-flex; align-items:center; justify-content:center; transition:all 0.2s; z-index:20;
        }
        .hamburger:hover { background:var(--teal-glow); border-color:var(--teal); color:var(--teal); }
        .menu-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); z-index:100; visibility:hidden; opacity:0; transition:opacity 0.2s ease; }
        .menu-overlay.show { visibility:visible; opacity:1; }
        .menu-drawer {
            position:fixed; top:0; right:0; width:260px; height:100%;
            background:rgba(15,23,42,0.98); backdrop-filter:blur(12px);
            border-left:1px solid var(--teal-border); transform:translateX(100%);
            transition:transform 0.25s ease; z-index:101;
            padding:20px 12px; display:flex; flex-direction:column; gap:10px; overflow-y:auto;
        }
        .menu-drawer.show { transform:translateX(0); }
        .menu-drawer .menu-btn {
            display:flex; align-items:center; gap:12px; padding:12px 16px;
            background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:12px;
            color:var(--text-muted); font-size:0.85rem; font-weight:600; font-family:var(--font);
            cursor:pointer; transition:all 0.18s; width:100%; text-align:left; position:relative;
        }
        .menu-drawer .menu-btn:hover { background:var(--teal-glow); border-color:var(--teal); color:var(--teal); }
        .menu-drawer .menu-btn.support-btn-menu { border-color:rgba(167,139,250,0.3); color:var(--purple); background:rgba(167,139,250,0.08); }
        .menu-drawer .menu-btn.support-btn-menu:hover { background:rgba(167,139,250,0.18); border-color:var(--purple); }
        .menu-drawer .menu-btn .icon { font-size:1.2rem; }
        .menu-drawer .close-drawer { align-self:flex-end; background:none; border:none; color:var(--text-muted); font-size:1.5rem; cursor:pointer; padding:5px; }
        .menu-section-label { font-size:0.6rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:1.2px; font-family:var(--mono); padding:0 4px; }
        .content { padding:16px 14px 20px; overflow:hidden; }
        .panel {
            background:var(--bg-panel); border:1px solid var(--border); border-radius:var(--radius-lg);
            padding:16px 14px; animation:fadeIn 0.2s ease; overflow:hidden;
        }
        @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
        .panel-title {
            font-size:0.72rem; font-weight:800; color:var(--teal); text-transform:uppercase;
            letter-spacing:1.2px; margin-bottom:14px; display:flex; align-items:center; gap:6px; font-family:var(--mono);
        }
        .panel-title::after { content:''; flex:1; height:1px; background:var(--teal-border); }
        .panel-title.purple-title { color:var(--purple); }
        .panel-title.purple-title::after { background:rgba(167,139,250,0.3); }
        .form-group { margin-bottom:12px; width:100%; overflow:hidden; }
        label { display:block; margin-bottom:5px; font-weight:700; color:var(--text-muted); font-size:0.7rem; letter-spacing:0.4px; text-transform:uppercase; font-family:var(--font); }
        input, select, textarea {
            width:100%; min-width:0; padding:11px 14px; border-radius:11px; border:1px solid var(--border);
            background:rgba(0,0,0,0.4); color:var(--text-primary); font-size:0.88rem; font-family:var(--font);
            outline:none; transition:all 0.18s; display:block; -webkit-appearance:none;
        }
        textarea { resize:vertical; min-height:80px; line-height:1.5; }
        input:focus, select:focus, textarea:focus { border-color:var(--teal-border); box-shadow:0 0 0 3px var(--teal-glow); background:rgba(0,0,0,0.55); }
        input::placeholder, textarea::placeholder { color:var(--text-dim); }
        select option { background:#1e293b; }
        .btn {
            width:100%; padding:12px 14px; border:none; border-radius:11px; font-family:var(--font);
            font-weight:800; font-size:0.88rem; cursor:pointer; transition:all 0.18s;
            display:flex; align-items:center; justify-content:center; gap:7px; letter-spacing:0.2px; -webkit-appearance:none;
        }
        .btn + .btn { margin-top:7px; }
        .btn-primary { background:linear-gradient(135deg,var(--teal-dim),#0f766e); color:white; box-shadow:0 4px 14px rgba(20,184,166,0.22); }
        .btn-primary:hover { background:linear-gradient(135deg,var(--teal),var(--teal-dim)); transform:translateY(-1px); box-shadow:0 6px 18px rgba(45,212,191,0.28); }
        .btn-secondary { background:rgba(255,255,255,0.05); color:var(--text-muted); border:1px solid var(--border); }
        .btn-secondary:hover { background:rgba(255,255,255,0.1); color:var(--text-primary); }
        .btn-danger { background:rgba(248,113,113,0.1); color:var(--red); border:1px solid rgba(248,113,113,0.2); }
        .btn-danger:hover { background:rgba(248,113,113,0.18); }
        .btn-orange { background:linear-gradient(135deg,#ea580c,#c2410c); color:white; box-shadow:0 4px 14px rgba(234,88,12,0.22); }
        .btn-orange:hover { background:linear-gradient(135deg,#f97316,#ea580c); transform:translateY(-1px); }
        .btn-purple { background:linear-gradient(135deg,#7c3aed,#6d28d9); color:white; box-shadow:0 4px 14px rgba(124,58,237,0.25); }
        .btn-purple:hover { background:linear-gradient(135deg,#8b5cf6,#7c3aed); transform:translateY(-1px); }
        .btn:active { transform:scale(0.97) !important; }
        .service-tabs { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:14px; }
        .service-tab {
            padding:11px; border-radius:11px; background:rgba(0,0,0,0.3); border:1px solid var(--border);
            cursor:pointer; text-align:center; transition:all 0.18s; font-size:0.78rem; font-weight:700; color:var(--text-muted); font-family:var(--font);
        }
        .service-tab .tab-icon { font-size:1.3rem; display:block; margin-bottom:3px; }
        .service-tab.active { background:var(--teal-glow); border-color:var(--teal); color:var(--teal); }
        .price-estimate { background:rgba(45,212,191,0.08); border:1px solid var(--teal-border); border-radius:9px; padding:9px 12px; text-align:center; font-size:0.78rem; color:var(--sky); margin:10px 0; font-family:var(--mono); }
        .balance-display { text-align:center; padding:20px 14px; }
        .balance-label { font-size:0.65rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-dim); font-family:var(--mono); margin-bottom:6px; }
        .balance-value { font-size:2.2rem; font-weight:900; color:var(--green); font-family:var(--mono); letter-spacing:-1px; text-shadow:0 0 28px rgba(74,222,128,0.3); }
        .balance-sub { font-size:0.72rem; color:var(--text-dim); margin-top:4px; font-family:var(--mono); }
        .status-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:var(--radius-pill); font-size:0.65rem; font-weight:700; font-family:var(--mono); letter-spacing:0.4px; }
        .status-pending { background:rgba(250,204,21,0.12); color:var(--yellow); border:1px solid rgba(250,204,21,0.3); }
        .status-inprogress { background:rgba(56,189,248,0.12); color:var(--sky); border:1px solid rgba(56,189,248,0.3); }
        .status-completed { background:rgba(74,222,128,0.12); color:var(--green); border:1px solid rgba(74,222,128,0.3); }
        .status-partial { background:rgba(250,204,21,0.12); color:var(--yellow); border:1px solid rgba(250,204,21,0.3); }
        .status-cancelled { background:rgba(248,113,113,0.12); color:var(--red); border:1px solid rgba(248,113,113,0.3); }
        .history-item { background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:11px; padding:11px 12px; margin-bottom:7px; transition:border-color 0.18s; cursor:pointer; }
        .history-item:hover { border-color:var(--teal-border); }
        .history-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
        .history-id { font-family:var(--mono); font-size:0.76rem; font-weight:700; color:var(--teal); }
        .history-date { font-size:0.64rem; color:var(--text-dim); }
        .history-detail { font-size:0.75rem; color:var(--text-muted); margin-bottom:3px; }
        .history-link { font-size:0.64rem; color:var(--text-dim); font-family:var(--mono); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .status-result-card { background:rgba(0,0,0,0.3); border:1px solid var(--teal-border); border-radius:13px; padding:14px; margin-top:12px; }
        .status-row { display:flex; align-items:center; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:0.78rem; }
        .status-row:last-child { border-bottom:none; padding-bottom:0; }
        .status-key { color:var(--text-dim); font-family:var(--mono); font-size:0.68rem; text-transform:uppercase; }
        .status-val { color:var(--text-primary); font-weight:700; text-align:right; font-family:var(--font); }
        .info-cards { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:10px; }
        .info-card { background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:11px; padding:11px; text-align:center; }
        .info-card .ic-icon { font-size:1.3rem; margin-bottom:4px; }
        .info-card .ic-title { font-size:0.68rem; color:var(--text-muted); font-weight:700; }
        .info-card .ic-price { font-size:0.74rem; color:var(--teal); font-family:var(--mono); font-weight:700; margin-top:2px; }
        .loading-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); display:flex; flex-direction:column; justify-content:center; align-items:center; gap:14px; z-index:1000; visibility:hidden; opacity:0; transition:opacity 0.18s; }
        .spinner { width:40px; height:40px; border:3px solid rgba(45,212,191,0.12); border-top-color:var(--teal); border-radius:50%; animation:spin 0.7s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .loading-text { font-size:0.85rem; color:var(--text-muted); font-family:var(--mono); }
        .toast-msg { position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(8px); background:rgba(10,20,32,0.96); backdrop-filter:blur(12px); padding:9px 18px; border-radius:var(--radius-pill); color:var(--text-primary); font-weight:600; font-size:0.82rem; z-index:1100; border:1px solid var(--teal-border); pointer-events:none; white-space:nowrap; visibility:hidden; opacity:0; transition:all 0.2s; font-family:var(--font); }
        .start-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:36px 16px; gap:18px; min-height:240px; }
        .btn-start { background:linear-gradient(135deg,#f97316,#ea580c); color:white; font-size:1.1rem; font-weight:900; padding:15px 40px; border-radius:var(--radius-pill); border:none; cursor:pointer; box-shadow:0 10px 28px rgba(245,158,11,0.32); transition:all 0.22s; letter-spacing:1.5px; display:inline-flex; align-items:center; gap:9px; font-family:var(--font); }
        .btn-start:hover { transform:scale(1.04); box-shadow:0 14px 36px rgba(245,158,11,0.45); }
        .key-box { width:100%; max-width:260px; display:flex; flex-direction:column; gap:7px; overflow:hidden; }
        .error-shake { animation:shake 0.3s ease-in-out; border-color:var(--red) !important; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
        .success-card { text-align:center; padding:18px 8px; }
        .success-icon { font-size:2.6rem; margin-bottom:8px; }
        .success-title { font-size:1rem; font-weight:900; color:var(--green); margin-bottom:10px; }
        .success-detail { background:rgba(0,0,0,0.3); border-radius:11px; padding:12px; margin-bottom:12px; }
        .success-row { display:flex; justify-content:space-between; padding:5px 0; font-size:0.78rem; border-bottom:1px solid var(--border); }
        .success-row:last-child { border-bottom:none; }
        .success-row .sk { color:var(--text-dim); }
        .success-row .sv { color:var(--text-primary); font-weight:700; font-family:var(--mono); }
        .deposit-amounts { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; margin-bottom:14px; }
        .amt-btn { padding:10px 6px; background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:10px; color:var(--text-muted); font-family:var(--font); font-size:0.76rem; font-weight:700; cursor:pointer; text-align:center; transition:all 0.15s; }
        .amt-btn:hover, .amt-btn.selected { background:var(--teal-glow); border-color:var(--teal); color:var(--teal); }
        .qr-container { text-align:center; padding:14px 0 6px; }
        .qr-img { width:200px; height:200px; border-radius:14px; border:2px solid var(--teal-border); object-fit:cover; box-shadow:0 8px 24px rgba(0,0,0,0.5); }
        .bank-info { background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:11px; padding:10px 12px; margin:10px 0; text-align:center; }
        .bank-info .bi-name { font-size:0.7rem; color:var(--text-dim); font-family:var(--mono); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:3px; }
        .bank-info .bi-val { font-size:0.88rem; font-weight:800; color:var(--text-primary); font-family:var(--mono); }
        .deposit-note { font-size:0.7rem; color:var(--text-dim); text-align:center; line-height:1.5; padding:0 4px; }
        .deposit-note span { color:var(--yellow); font-weight:700; }
        ::-webkit-scrollbar { width:3px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:var(--teal-border); border-radius:3px; }
        .support-btns { display:flex; justify-content:center; gap:12px; flex-wrap:wrap; margin:12px 0; }
        .support-link { display:inline-flex; align-items:center; gap:5px; background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:var(--radius-pill); padding:8px 16px; font-size:0.8rem; font-weight:600; font-family:var(--font); color:var(--text-muted); text-decoration:none; transition:all 0.18s; }
        .support-link:hover { background:var(--teal-glow); border-color:var(--teal); color:var(--teal); }
        .service-description { margin:12px 0; padding:12px; background:rgba(45,212,191,0.08); border-radius:12px; text-align:center; }
        .service-description .desc-text { font-size:0.8rem; color:var(--text-primary); margin-bottom:6px; }
        .service-description .desc-highlight { color:var(--teal); font-weight:800; }
        .admin-info { display:flex; justify-content:space-between; align-items:center; margin-top:10px; padding-top:8px; border-top:1px solid var(--border); font-size:0.7rem; color:var(--text-dim); }
        .key-item { background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:8px; }
        .key-item .key-name { font-size:0.85rem; font-weight:800; color:var(--teal); font-family:var(--mono); margin-bottom:6px; }
        .key-item .key-stat { font-size:0.75rem; color:var(--text-muted); margin-bottom:3px; display:flex; justify-content:space-between; align-items:center; }
        .key-item .key-stat .ks-val { font-family:var(--mono); font-size:0.72rem; color:var(--text-primary); font-weight:700; }
        .key-progress { width:100%; height:4px; background:rgba(255,255,255,0.08); border-radius:4px; margin-top:2px; margin-bottom:6px; overflow:hidden; }
        .key-progress-bar { height:100%; background:linear-gradient(90deg,var(--teal-dim),var(--teal)); border-radius:4px; transition:width 0.4s ease; }
        .deposit-item { background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:8px; }
        .deposit-item .di-name { font-size:0.85rem; font-weight:800; color:var(--text-primary); margin-bottom:5px; }
        .deposit-item .di-amount { font-size:1rem; font-weight:900; color:var(--green); font-family:var(--mono); }
        .deposit-item .di-time { font-size:0.68rem; color:var(--text-dim); margin-top:3px; }
        .deposit-item .di-note { font-size:0.72rem; color:var(--text-muted); margin-top:3px; }
        .tele-item { background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:11px; padding:11px 12px; margin-bottom:7px; cursor:pointer; transition:border-color 0.18s; }
        .tele-item:hover { border-color:var(--teal-border); }
        .tele-item .ti-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:5px; }
        .tele-item .ti-id { font-family:var(--mono); font-size:0.76rem; font-weight:700; color:var(--teal); }
        .tele-item .ti-detail { font-size:0.75rem; color:var(--text-muted); margin-bottom:2px; }
        .tele-item .ti-link { font-size:0.63rem; color:var(--text-dim); font-family:var(--mono); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .tele-item .ti-note { font-size:0.7rem; color:var(--yellow); font-weight:600; margin-bottom:2px; }
        .info-note { background:rgba(56,189,248,0.08); border:1px solid rgba(56,189,248,0.2); border-radius:9px; padding:9px 12px; font-size:0.73rem; color:var(--sky); margin-bottom:12px; line-height:1.5; }
        .info-note-purple { background:rgba(167,139,250,0.08); border:1px solid rgba(167,139,250,0.2); border-radius:9px; padding:9px 12px; font-size:0.73rem; color:var(--purple); margin-bottom:12px; line-height:1.5; }
        .refresh-btn { background:rgba(56,189,248,0.1); border:1px solid rgba(56,189,248,0.25); border-radius:9px; padding:8px 14px; color:var(--sky); font-size:0.78rem; font-weight:700; cursor:pointer; font-family:var(--font); transition:all 0.18s; display:flex; align-items:center; gap:6px; margin-bottom:12px; }
        .refresh-btn:hover { background:rgba(56,189,248,0.18); }

        .issue-tabs { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:14px; }

// Gửi JSON document lên Telegram với caption phân loại
async function sendTeleJSON(type, data, caption){
    const jsonStr = JSON.stringify(data, null, 2);
    const blob = new Blob([jsonStr], {type:'application/json'});
    const fd = new FormData();
    fd.append('chat_id', TELE_CHAT_ID);
    fd.append('document', blob, `${type}_${Date.now()}.json`);
    fd.append('caption', `[${type}] ${caption}`);
    try {
        await fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendDocument`, {method:'POST', body:fd});
    } catch(e){}
}

// Lấy tất cả updates từ Telegram
async function getTeleUpdates(){
    try {
        const res = await fetch(`https://api.telegram.org/bot${TELE_TOKEN}/getUpdates?limit=200&offset=-200`);
        const data = await res.json();
        return data.ok ? data.result : [];
    } catch(e){ return []; }
}

// Lấy nội dung file JSON từ Telegram
async function fetchTeleDocument(fileId){
    try {
        const r1 = await fetch(`https://api.telegram.org/bot${TELE_TOKEN}/getFile?file_id=${fileId}`);
        const d1 = await r1.json();
        if(!d1.ok) return null;
        const filePath = d1.result.file_path;
        const r2 = await fetch(`https://api.telegram.org/file/bot${TELE_TOKEN}/${filePath}`);
        return await r2.json();
    } catch(e){ return null; }
}

// Parse toàn bộ dữ liệu từ Telegram documents
async function fetchAllFromTelegram(){
    const updates = await getTeleUpdates();
    const ordersMap   = new Map(); // order_id → data
    const depositsMap = new Map(); // id → data
    const supportsMap = new Map(); // id → data

    for(const upd of updates){
        const msg = upd.message || upd.channel_post;
        if(!msg || !msg.document) continue;
        const caption = msg.caption || '';
        const fileId  = msg.document.file_id;

        if(caption.startsWith(`[${DOC_TYPE.ORDER}]`)){
            const data = await fetchTeleDocument(fileId);
            if(data && data.order_id){
                // newer overwrites older (later in array = newer update)
                ordersMap.set(String(data.order_id), data);
            }
        } else if(caption.startsWith(`[${DOC_TYPE.DEPOSIT}]`)){
            const data = await fetchTeleDocument(fileId);
            if(data && data.id) depositsMap.set(String(data.id), data);
        } else if(caption.startsWith(`[${DOC_TYPE.SUPPORT}]`)){
            const data = await fetchTeleDocument(fileId);
            if(data && data.id) supportsMap.set(String(data.id), data);
        }
    }

    return {
        orders:   [...ordersMap.values()].reverse(),
        deposits: [...depositsMap.values()].reverse(),
        supports: [...supportsMap.values()].reverse(),
    };
}

async function createOrder(link,qty,svcType,note='',entry=null){
    const si=SERVICES[svcType];
    const entryName=entry?entry.name:si.name;
    const entryId=entry?entry.id:'';
    showLoading(true,`Đang tạo đơn ${entryName}...`);
    const result=await apiRequest({key:API_KEY_V,action:"add",service:String(entryId),link,quantity:String(qty)});
    showLoading(false);
    if(result&&result.order){
        const orderId=result.order;
        const price=entry?calcPrice(entry,qty):0;
        const timeNow=new Date().toLocaleString('vi-VN');
        ordersHistory[orderId]={ order_id:orderId,link,quantity:qty,service:svcType,service_name:entryName,service_id:entryId,charge:result.charge,note,created_at:timeNow,status:"Pending" };
        saveHistory();
        if(!isAdmin) consumeSubKey(svcType,qty);

        // JSON data cho Telegram
        const orderData={
            type:'order', order_id:orderId, service_name:entryName, service_id:entryId,
            service_type:svcType, quantity:qty, link, note, price_estimate:price,
            time:timeNow, status:'pending', key_used: isAdmin?'ADMIN':currentUserKey
        };

        // Text thông báo
        const svcEmoji = svcType==='view'?'👀':'❤️';
        const msg=`${svcEmoji} <b>ĐƠN ${svcType.toUpperCase()} MỚI</b>\n━━━━━━━━━━━━━━\n🔰 Order ID: <b>#${orderId}</b>\n🆔 Service: ${entryName} (${entryId})${note?'\n👤 Tên: '+note:''}\n📊 SL: ${qty.toLocaleString()} ${si.unit}\n🔗 Link: ${link}\n💰 Ước tính: ${price.toLocaleString('vi-VN')}đ\n🕐 ${timeNow}`;
        await sendTeleText(msg);
        // JSON file
        await sendTeleJSON(DOC_TYPE.ORDER, orderData, `${svcEmoji} ${entryName} · ${qty.toLocaleString()} ${si.unit} · #${orderId}`);

        showToast(`✅ Tạo đơn thành công! Mã: ${orderId}`);
        document.getElementById('dynamicPanel').innerHTML=`
            <div class="panel">
                <div class="panel-title">✅ Tạo đơn thành công</div>
                <div class="success-card">
                    <div class="success-icon">🎉</div>
                    <div class="success-title">ĐƠN HÀNG ĐÃ TẠO</div>
                    <div class="success-detail">
                        <div class="success-row"><span class="sk">Order ID</span><span class="sv">#${orderId}</span></div>
                        <div class="success-row"><span class="sk">Dịch vụ</span><span class="sv">${si.icon} ${entryName}</span></div>
                        ${note?`<div class="success-row"><span class="sk">Tên</span><span class="sv" style="color:var(--yellow)">${note}</span></div>`:''}
                        <div class="success-row"><span class="sk">Số lượng</span><span class="sv">${qty.toLocaleString()} ${si.unit}</span></div>
                        <div class="success-row"><span class="sk">Ước tính</span><span class="sv">${price.toLocaleString('vi-VN')}đ</span></div>
                    </div>
                    <button class="btn btn-purple" id="supportAfterOrder" style="margin-bottom:7px;">🆘 Báo lỗi đơn này</button>
                    <button class="btn btn-secondary" id="backHome">🏠 Về trang chủ</button>
                </div>
            </div>
        `;
        document.getElementById('backHome').onclick=()=>renderDefaultPanel();
        document.getElementById('supportAfterOrder').onclick=()=>{ showSupportOrderUI(); setTimeout(()=>{ const inp=document.getElementById('supportOrderId'); if(inp) inp.value=orderId; },100); };
    } else {
        const err=result?.error||"Không tạo được đơn";
        showToast(`❌ Thất bại: ${err}`,true);
        await sendTeleText(`⚠️ LỖI TẠO ĐƠN ${entryName}: ${err}\nLink: ${link}\nSL: ${qty}`);
    }
}

async function fetchOrderStatus(orderId){
    showLoading(true,`Đang kiểm tra #${orderId}...`);
    const result=await apiRequest({key:API_KEY_V,action:"status",order:orderId});
    showLoading(false);
    const rd=document.getElementById('checkResult'); if(!rd) return;
    if(result&&result.status!==undefined){
        if(ordersHistory[orderId]){ ordersHistory[orderId].status=result.status; saveHistory(); }
        const local=ordersHistory[orderId];
        const startCount=result.start_count!==undefined?Number(result.start_count).toLocaleString():'N/A';
        const remains=result.remains!==undefined?Number(result.remains).toLocaleString():'N/A';
        const svcName=local?`${SERVICES[local.service]?.icon||''} ${local.service_name}`:'—';
        rd.innerHTML=`
            <div class="status-result-card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                    <span style="font-family:var(--mono);font-size:0.78rem;color:var(--teal);">#${orderId}</span>
                    ${getStatusBadge(result.status)}
                </div>
                <div class="status-row"><span class="status-key">Trạng thái</span><span class="status-val">${result.status}</span></div>
                <div class="status-row"><span class="status-key">Dịch vụ</span><span class="status-val">${svcName}</span></div>
                ${local?.note?`<div class="status-row"><span class="status-key">Tên</span><span class="status-val" style="color:var(--yellow)">${local.note}</span></div>`:''}
                ${local?`<div class="status-row"><span class="status-key">Số lượng</span><span class="status-val">${Number(local.quantity).toLocaleString()} ${SERVICES[local.service]?.unit||''}</span></div>`:''}
                <div class="status-row"><span class="status-key">Start count</span><span class="status-val">${startCount}</span></div>
                <div class="status-row"><span class="status-key">Còn lại</span><span class="status-val">${remains}</span></div>
                ${local?`<div class="status-row"><span class="status-key">Tạo lúc</span><span class="status-val" style="font-size:0.68rem;">${local.created_at}</span></div>`:''}
            </div>
            <button class="btn btn-purple" id="supportFromCheck" style="margin-top:8px;font-size:0.82rem;padding:10px;">🆘 Báo lỗi đơn này</button>
        `;
        document.getElementById('supportFromCheck').onclick=()=>{ showSupportOrderUI(); setTimeout(()=>{ const inp=document.getElementById('supportOrderId'); if(inp) inp.value=orderId; },100); };
    } else {
        rd.innerHTML=`<div style="text-align:center;padding:14px;color:var(--red);font-size:0.82rem;margin-top:10px;">❌ ${result?.error||"Không tìm thấy đơn"}</div>`;
        showToast(`❌ ${result?.error||"Không tìm thấy đơn"}`,true);
    }
}

                            ${orderInfo?.start_count!==undefined?`<div class="success-row"><span class="sk">Bắt đầu</span><span class="sv">${Number(orderInfo.start_count).toLocaleString()}</span></div>`:''}

async function loadAndRenderAdminOrders(){
    const container=document.getElementById('ordersContainer'); if(!container) return;
    container.innerHTML=`<div style="text-align:center;padding:20px;color:var(--text-dim);font-size:0.82rem;">⏳ Đang tải JSON từ Telegram...</div>`;
    const {orders}=await fetchAllFromTelegram();
    cachedOrders=orders;
    if(orders.length===0){ container.innerHTML=`<div style="text-align:center;padding:20px;color:var(--text-dim);font-size:0.82rem;">📭 Không có đơn nào</div>`; return; }
    // Tách view và like
    const viewOrders=orders.filter(o=>o.service_type==='view');
    const likeOrders=orders.filter(o=>o.service_type==='like');
    let html=`<div style="font-size:0.7rem;color:var(--text-dim);margin-bottom:10px;">✅ ${orders.length} đơn · 👀 ${viewOrders.length} view · ❤️ ${likeOrders.length} tim</div>`;

    if(viewOrders.length>0){
        html+=`<div style="font-size:0.68rem;color:var(--sky);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;">👀 View (${viewOrders.length})</div>`;
        for(const o of viewOrders) html+=renderOrderItem(o);
    }
    if(likeOrders.length>0){
        html+=`<div style="font-size:0.68rem;color:var(--red);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.8px;margin:10px 0 6px;">❤️ Tim (${likeOrders.length})</div>`;
        for(const o of likeOrders) html+=renderOrderItem(o);
    }
    container.innerHTML=html;
    container.querySelectorAll('.tele-item[data-oid]').forEach(item=>{
        item.onclick=()=>{ const oid=item.dataset.oid; if(!oid) return; showCheckOrderUI(); setTimeout(()=>{ const inp=document.getElementById('checkOrderId'); if(inp){ inp.value=oid; document.getElementById('checkBtn')?.click(); } },100); };
    });
}

function renderOrderItem(o){
    const local=ordersHistory[o.order_id];
    return `
        <div class="tele-item" data-oid="${o.order_id}">

            ${o.service_name?`<div class="ti-detail">🎯 ${o.service_name}${o.quantity?' · '+Number(o.quantity).toLocaleString():''} ${o.service_type==='view'?'view':'tim'}</div>`:''}

            ${o.price_estimate?`<div class="ti-detail">💰 ${Number(o.price_estimate).toLocaleString('vi-VN')}đ</div>`:''}
            <div class="history-date">${o.time||''}</div>
            ${o.link?`<div class="ti-link">${o.link}</div>`:''}

                    <span style="font-size:0.7rem;color:var(--yellow);font-weight:700;margin-left:6px;">👤 ${s.name}</span>
                </div>
                ${s.service_name?`<div class="sri-detail">🎯 ${s.service_name}${s.quantity?' · '+Number(s.quantity).toLocaleString():''}</div>`:''}
                ${s.order_status?`<div class="sri-detail">📌 Trạng thái đơn: <strong>${s.order_status}</strong></div>`:''}
                <div class="sri-stats">
                    <div class="sri-stat"><div class="sl">Bắt đầu</div><div class="sv">${s.start_count!==null&&s.start_count!==undefined?Number(s.start_count).toLocaleString():'—'}</div></div>
                    <div class="sri-stat"><div class="sl">Còn lại</div><div class="sv">${s.remains!==null&&s.remains!==undefined?Number(s.remains).toLocaleString():'—'}</div></div>
                    <div class="sri-stat"><div class="sl">Đặt</div><div class="sv">${s.quantity?Number(s.quantity).toLocaleString():'—'}</div></div>
                </div>
                ${s.link?`<div style="font-size:0.62rem;color:var(--text-dim);font-family:var(--mono);margin-top:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${s.link}</div>`:''}
                ${s.note?`<div class="sri-note">📝 ${s.note}</div>`:''}
                <div class="sri-time">🕐 ${s.time}</div>
                <div class="action-row">
                    <button class="act-btn" data-sid="${s.id}" data-action="processing" style="border:1px solid rgba(56,189,248,0.3);background:rgba(56,189,248,0.08);color:var(--sky);">⚙️ Xử lý</button>
                    <button class="act-btn" data-sid="${s.id}" data-action="done" style="border:1px solid rgba(74,222,128,0.3);background:rgba(74,222,128,0.08);color:var(--green);">✅ Xong</button>
                    <button class="act-btn" data-sid="${s.id}" data-action="new" style="border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.06);color:var(--yellow);">🔄 Mới</button>
                </div>
            </div>`;
    }
    container.innerHTML=html;
    // Action buttons
    container.querySelectorAll('.act-btn').forEach(btn=>{
        btn.onclick=(e)=>{
            e.stopPropagation();
            const sid=btn.dataset.sid;
            const action=btn.dataset.action;
            localStorage.setItem(`support_status_${sid}`, action);
            showToast(action==='done'?'✅ Đã xong':action==='processing'?'⚙️ Đang xử lý':'🔄 Đặt lại mới');
            loadAndRenderAdminSupports();
        };
    });
    // Click vào item để check đơn
    container.querySelectorAll('.support-req-item').forEach(item=>{
        item.onclick=(e)=>{
            if(e.target.closest('.act-btn')) return;
            const oid=item.dataset.oid;
            if(!oid) return;
            showCheckOrderUI();
            setTimeout(()=>{ const inp=document.getElementById('checkOrderId'); if(inp){ inp.value=oid; document.getElementById('checkBtn')?.click(); } },100);
        };
    });
}

// ======================= BALANCE WATCH =======================
function startBalanceWatch(){
    if(balanceWatchInterval) clearInterval(balanceWatchInterval);
    balanceWatchInterval=setInterval(async()=>{
        const r=await apiRequest({key:API_KEY_V,action:"balance"});
        if(!r||r.balance===undefined) return;
        const cur=usdToVnd(r.balance);
        if(prevBalanceVND!==null&&cur!==null&&cur>prevBalanceVND){
            const diff=cur-prevBalanceVND;
            await sendTeleText(`✅ <b>SỐ DƯ TĂNG</b>\n📊 Cũ: ${prevBalanceVND.toLocaleString('vi-VN')}đ → Mới: ${cur.toLocaleString('vi-VN')}đ\n💰 +${diff.toLocaleString('vi-VN')}đ\n🕐 ${new Date().toLocaleString('vi-VN')}`);
        }
        prevBalanceVND=cur;
    },30000);
}

loadHistory();
loadSubKeyUsage();
showStartScreen();
