    function showToast(msg, isError = false) {
        let t = document.querySelector('.toast-msg');
        if (!t) { t = document.createElement('div'); t.className = 'toast-msg'; document.body.appendChild(t); }
        t.style.borderColor = isError ? 'rgba(248,113,113,0.4)' : 'rgba(0,229,195,0.25)';
        t.innerHTML = msg;
        t.style.visibility = 'visible';
        t.style.opacity = '1';
        t.style.transform = 'translateX(-50%) translateY(0)';
        setTimeout(() => {
            t.style.opacity = '0';
            t.style.transform = 'translateX(-50%) translateY(8px)';
            setTimeout(() => t.style.visibility = 'hidden', 300);
        }, 2800);
    }

    function showLoading(show, text = "Đang xử lý...") {
        const ol = document.getElementById('loadingOverlay');
        const tl = document.getElementById('loadingText');
        if (tl) tl.textContent = text;
        ol.style.visibility = show ? 'visible' : 'hidden';
        ol.style.opacity = show ? '1' : '0';
    }

    function sendTelegramNotification(text) {
        if (!TELE_TOKEN || !TELE_CHAT_ID) return;
        fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: TELE_CHAT_ID, text, parse_mode: "HTML" })
        }).catch(() => {});
    }

    async function apiRequest(payload) {
        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/json' },
                body: new URLSearchParams(payload).toString()
            });
            return await res.json();
        } catch(e) { return { error: e.message || "Lỗi kết nối" }; }
    }

    function isValidTikTokUrl(url) {
        return [
            /^https?:\/\/(?:www\.)?tiktok\.com\/@[^\/]+\/video\/\d+/,
            /^https?:\/\/(?:vm|vt)\.tiktok\.com\/\w+\/?$/,
            /^https?:\/\/(?:www\.)?tiktok\.com\/t\/\w+\/?$/
        ].some(p => p.test(url.trim()));
    }

    function calcPriceForSvc(svcEntry, qty) {
        // price là giá / 1000 cho view, giá / min cho like
        if (!svcEntry) return 0;
        return Math.ceil(qty / svcEntry.min) * svcEntry.price;
    }

    function getStatusBadge(status) {
        const s = (status || '').toLowerCase();
        if (s === 'completed') return `<span class="status-badge status-completed">✓ Hoàn thành</span>`;
        if (s === 'in progress' || s === 'inprogress' || s === 'processing') return `<span class="status-badge status-inprogress">⟳ Đang chạy</span>`;
        if (s === 'partial') return `<span class="status-badge status-partial">◑ Một phần</span>`;
        if (s === 'cancelled' || s === 'canceled') return `<span class="status-badge status-cancelled">✕ Đã hủy</span>`;
        return `<span class="status-badge status-pending">⏳ Chờ xử lý</span>`;
    }

    function usdToVnd(usdStr) {
        const usd = parseFloat(usdStr);
        if (isNaN(usd)) return null;
        return Math.round(usd * USD_TO_VND);
    }

    function startBalanceWatch() {
        if (balanceWatchInterval) return;
        balanceWatchInterval = setInterval(async () => {
            const result = await apiRequest({ key: API_KEY, action: "balance" });
            if (!result || result.balance === undefined) return;
            const curVnd = usdToVnd(result.balance);
            if (prevBalanceVND !== null && curVnd !== null && curVnd !== prevBalanceVND) {
                const diff = curVnd - prevBalanceVND;
                if (diff > 0) {
                    // Số dư tăng → thông báo nạp tiền thành công
                    const msg = `✅ <b>SỐ DƯ ĐÃ ĐƯỢC CỘNG</b>\n━━━━━━━━━━━━━━\n📊 Số dư cũ: ${prevBalanceVND.toLocaleString('vi-VN')}đ\n📈 Số dư mới: ${curVnd.toLocaleString('vi-VN')}đ\n💰 Số tiền nạp: <b>+${diff.toLocaleString('vi-VN')}đ</b>\n🕐 ${new Date().toLocaleString('vi-VN')}`;
                    sendTelegramNotification(msg);
                }
            }
            prevBalanceVND = curVnd;
        }, 30000); // Check mỗi 30 giây
    }

    async function createOrder(link, quantity, serviceType, note = '', svcEntry = null) {
        const svcInfo = SERVICES[serviceType];
        const entryName = svcEntry ? svcEntry.name : svcInfo.name;
        const entryId = svcEntry ? svcEntry.id : '';
        showLoading(true, `Đang tạo đơn ${entryName}...`);
        const result = await apiRequest({ key: API_KEY, action: "add", service: String(entryId), link, quantity: String(quantity) });
        showLoading(false);

        if (result && result.order) {
            const orderId = result.order;
            const charge = result.charge || "N/A";
            const priceEst = svcEntry ? calcPriceForSvc(svcEntry, quantity) : 0;
            ordersHistory[orderId] = {
                order_id: orderId, link, quantity, service: serviceType,
                service_name: entryName, service_id: entryId, charge, note,
                created_at: new Date().toLocaleString('vi-VN'), status: "Pending"
            };
            saveHistory();

            sendTelegramNotification(`✅ ĐƠN MỚI: ${entryName.toUpperCase()}\n🔰 Order ID: ${orderId}\n🆔 Service ID: ${entryId}${note ? '\n👤 Tên: ' + note : ''}\n📊 SL: ${quantity.toLocaleString()} ${svcInfo.unit}\n🔗 Link: ${link}\n💰 Ước tính: ${priceEst.toLocaleString('vi-VN')}đ`);
            showToast(`✅ Tạo đơn thành công! Mã: ${orderId}`);

            document.getElementById('dynamicPanel').innerHTML = `
                <div class="panel">
                    <div class="panel-title">✅ Tạo đơn thành công</div>
                    <div class="success-card">
                        <div class="success-icon">🎉</div>
                        <div class="success-title">ĐƠN HÀNG ĐÃ TẠO</div>
                        <div class="success-detail">
                            <div class="success-row"><span class="sk">Order ID</span><span class="sv">#${orderId}</span></div>
                            <div class="success-row"><span class="sk">Dịch vụ</span><span class="sv">${svcInfo.icon} ${entryName}</span></div>
                            <div class="success-row"><span class="sk">Service ID</span><span class="sv" style="font-family:var(--mono)">${entryId}</span></div>
                            ${note ? `<div class="success-row"><span class="sk">Tên</span><span class="sv" style="color:var(--yellow)">${note}</span></div>` : ''}
                            <div class="success-row"><span class="sk">Số lượng</span><span class="sv">${quantity.toLocaleString()} ${svcInfo.unit}</span></div>
                            <div class="success-row"><span class="sk">Ước tính</span><span class="sv">${priceEst.toLocaleString('vi-VN')}đ</span></div>
                        </div>
                        <button class="btn btn-secondary" id="backHomeBtn">🏠 Về trang chủ</button>
                    </div>
                </div>
            `;
            document.getElementById('backHomeBtn').onclick = renderMainMenu;
        } else {
            const errMsg = result?.error || "Không tạo được đơn, kiểm tra số dư hoặc liên hệ admin";
            showToast(`❌ Thất bại: ${errMsg}`, true);
            sendTelegramNotification(`⚠️ LỖI TẠO ĐƠN ${entryName}: ${errMsg}\nLink: ${link}\nSL: ${quantity}`);
        }
    }

    // --- Check Order Status ---
    function showCheckOrderUI() {
        highlightMenuBtn('btnCheck');
        const panel = document.getElementById('dynamicPanel');
        const lastOrderId = Object.keys(ordersHistory).pop() || '';

        panel.innerHTML = `
            <div class="panel">
                <div class="panel-title">🔍 Kiểm tra trạng thái</div>
                <div class="form-group">
                    <label>🔢 Mã đơn hàng (Order ID)</label>
                    <input type="text" id="checkOrderId" placeholder="Nhập Order ID..." value="${lastOrderId}">
                </div>
                <button class="btn btn-primary" id="checkBtn">🔍 Kiểm tra ngay</button>
                <div id="checkResult"></div>
                <button class="btn btn-secondary" style="margin-top:8px;" id="cancelCheckBtn">↩ Quay lại</button>
            </div>
        `;

        document.getElementById('checkBtn').onclick = async () => {
            const orderId = document.getElementById('checkOrderId').value.trim();
            if (!orderId) { showToast("Vui lòng nhập Order ID", true); return; }
            await fetchOrderStatus(orderId);
        };

        document.getElementById('cancelCheckBtn').onclick = renderMainMenu;

        document.getElementById('checkOrderId').onkeypress = (e) => {
            if (e.key === 'Enter') document.getElementById('checkBtn').click();
        };
    }

    async function fetchOrderStatus(orderId) {
        showLoading(true, `Đang kiểm tra đơn #${orderId}...`);
        const result = await apiRequest({ key: API_KEY, action: "status", order: orderId });
        showLoading(false);

        const resultDiv = document.getElementById('checkResult');
        if (!resultDiv) return;

        if (result && result.status !== undefined) {
            if (ordersHistory[orderId]) {
                ordersHistory[orderId].status = result.status;
                saveHistory();
            }

            const statusBadge = getStatusBadge(result.status);
            const startCount = result.start_count !== undefined ? Number(result.start_count).toLocaleString() : 'N/A';
            const remains = result.remains !== undefined ? Number(result.remains).toLocaleString() : 'N/A';
            const charge = result.charge !== undefined ? (parseFloat(result.charge) || 0).toLocaleString('vi-VN') + 'đ' : 'N/A';
            const localOrder = ordersHistory[orderId];
            const svcName = localOrder ? `${SERVICES[localOrder.service]?.icon || ''} ${localOrder.service_name}` : '—';

            resultDiv.innerHTML = `
                <div class="status-result-card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <span style="font-family:var(--mono); font-size:0.78rem; color:var(--teal);">#${orderId}</span>
                        ${statusBadge}
                    </div>
                    <div class="status-row"><span class="status-key">Trạng thái</span><span class="status-val">${result.status}</span></div>
                    ${localOrder ? `<div class="status-row"><span class="status-key">Dịch vụ</span><span class="status-val">${svcName}</span></div>` : ''}
                    ${localOrder?.note ? `<div class="status-row"><span class="status-key">Tên</span><span class="status-val" style="color:var(--yellow)">${localOrder.note}</span></div>` : ''}
                    ${localOrder ? `<div class="status-row"><span class="status-key">Số lượng đặt</span><span class="status-val">${Number(localOrder.quantity).toLocaleString()} ${SERVICES[localOrder.service]?.unit || ''}</span></div>` : ''}
                    <div class="status-row"><span class="status-key">Start count</span><span class="status-val">${startCount}</span></div>
                    <div class="status-row"><span class="status-key">Còn lại</span><span class="status-val">${remains}</span></div>
                    <div class="status-row"><span class="status-key">Phí</span><span class="status-val">${charge}</span></div>
                    ${localOrder ? `<div class="status-row"><span class="status-key">Tạo lúc</span><span class="status-val" style="font-size:0.68rem;">${localOrder.created_at}</span></div>` : ''}
                </div>
            `;
        } else {
            const errMsg = result?.error || "Không tìm thấy đơn hàng này";
            resultDiv.innerHTML = `<div style="text-align:center; padding:14px; color:var(--red); font-size:0.82rem; margin-top:10px;">❌ ${errMsg}</div>`;
            showToast(`❌ ${errMsg}`, true);
        }
    }

    // --- History ---
    function showHistoryUI() {
        highlightMenuBtn('btnHistory');
        const panel = document.getElementById('dynamicPanel');
        const orders = Object.values(ordersHistory).reverse();

        if (orders.length === 0) {
            panel.innerHTML = `
                <div class="panel" style="text-align:center; padding:28px 14px;">
                    <div style="font-size:1.8rem; margin-bottom:9px;">📭</div>
                    <div style="color:var(--text-dim); font-size:0.82rem;">Chưa có đơn nào</div>
                    <button class="btn btn-secondary" style="margin-top:14px;" id="backHistory">↩ Quay lại</button>
                </div>
            `;
            document.getElementById('backHistory').onclick = renderMainMenu;
            return;
        }

        let html = `<div class="panel"><div class="panel-title">📋 Lịch sử (${orders.length})</div>`;

        for (const d of orders) {
            const svc = SERVICES[d.service] || {};
            html += `
                <div class="history-item" data-oid="${d.order_id}">
                    <div class="history-header">
                        <span class="history-id">#${d.order_id}</span>
                        ${getStatusBadge(d.status)}
                    </div>
                    <div class="history-detail">${svc.icon || ''} ${d.service_name || d.service} · ${Number(d.quantity).toLocaleString()} ${svc.unit || ''}</div>
                    ${d.note ? `<div style="font-size:0.7rem; color:var(--yellow); margin-bottom:2px; font-weight:600;">👤 ${d.note}</div>` : ''}
                    <div class="history-date" style="margin-bottom:3px;">${d.created_at || ''}</div>
                    <div class="history-link">${d.link || ''}</div>
                </div>
            `;
        }

        html += `
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-top:4px;">
                <button class="btn btn-danger" id="clearHistoryBtn">🗑️ Xóa lịch sử</button>
                <button class="btn btn-secondary" id="backHistoryBtn">↩ Quay lại</button>
            </div>
        </div>`;

        panel.innerHTML = html;

        panel.querySelectorAll('.history-item').forEach(item => {
            item.onclick = () => {
                const oid = item.dataset.oid;
                showCheckOrderUI();
                setTimeout(() => {
                    const inp = document.getElementById('checkOrderId');
                    if (inp) {
                        inp.value = oid;
                        document.getElementById('checkBtn')?.click();
                    }
                }, 100);
            };
        });

        document.getElementById('clearHistoryBtn').onclick = () => {
            if (confirm("Xóa toàn bộ lịch sử đơn hàng?")) {
                ordersHistory = {};
                saveHistory();
                showHistoryUI();
                showToast("Đã xóa lịch sử");
            }
        };
        document.getElementById('backHistoryBtn').onclick = renderMainMenu;
    }

    function highlightMenuBtn(activeId) {
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(activeId)?.classList.add('active');
    }

    // --- Start Screen ---
    function showStartScreen() {
        document.getElementById('mainContent').innerHTML = `
            <div class="start-screen">
                <button class="btn-start" id="startBtn">▶ START</button>
                <div id="keySection" style="display:none;" class="key-box">
                    <input type="password" id="secretKey" placeholder="🔐 Nhập mã kích hoạt" style="text-align:center;">
                    <button class="btn btn-primary" id="submitKeyBtn">Xác nhận</button>
                </div>
            </div>
        `;

        document.getElementById('startBtn').onclick = () => {
            showLoading(true, "Đang khởi động...");
            setTimeout(() => {
                showLoading(false);
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('keySection').style.display = 'flex';
                document.getElementById('secretKey').focus();
                showToast("🔐 Nhập mã kích hoạt để tiếp tục");
            }, 1200);
        };

        const verify = () => {
            const key = document.getElementById('secretKey').value.trim();
            if (key === VALID_KEY) {
                showLoading(true, "Xác thực thành công...");
                setTimeout(() => {
                    showLoading(false);
                    isAuthenticated = true;
                    renderMainMenu();
                    startBalanceWatch();
                    showToast("✅ Đăng nhập thành công!");
                }, 700);
            } else {
                const inp = document.getElementById('secretKey');
                inp.classList.add('error-shake');
                showToast("❌ Mã kích hoạt không đúng!", true);
                setTimeout(() => inp.classList.remove('error-shake'), 400);
                inp.value = '';
                inp.focus();
            }
        };

        document.getElementById('submitKeyBtn').onclick = verify;
        document.getElementById('secretKey').onkeypress = e => { if (e.key === 'Enter') verify(); };
    }

    // --- Init ---
    loadHistory();
    loadServiceIds();
    showStartScreen();
</script>

</body>
</html>
