    async function fetchOrdersFromTelegram() {
        try {
            const res = await fetch(`https://api.telegram.org/bot${TELE_TOKEN}/getUpdates?limit=100&offset=-100`);
            const data = await res.json();
            if (!data.ok || !data.result) return [];

            const orders = [];
            for (const update of data.result) {
                const msg = update.message || update.channel_post;
                if (!msg || !msg.text) continue;
                const text = msg.text;

                // Chỉ lấy tin nhắn có dạng đơn hàng (có "ĐƠN MỚI" hoặc "Order ID")
                if (!text.includes('ĐƠN MỚI') && !text.includes('Order ID')) continue;

                // Parse thông tin đơn
                const order = { raw: text, date: new Date(msg.date * 1000).toLocaleString('vi-VN') };

                const orderIdMatch = text.match(/Order ID[:\s]*(\d+)/i);
                if (orderIdMatch) order.order_id = orderIdMatch[1];

                const svcMatch = text.match(/ĐƠN MỚI[:\s]*([^\n]+)/i);
                if (svcMatch) order.service_name = svcMatch[1].trim();

                const slMatch = text.match(/SL[:\s]*([\d,\.]+)/i);
                if (slMatch) order.quantity = slMatch[1].replace(/[,\.]/g, '');

                const linkMatch = text.match(/Link[:\s]*(https?:\/\/[^\n]+)/i);
                if (linkMatch) order.link = linkMatch[1].trim();

                const noteMatch = text.match(/Tên[:\s]*([^\n]+)/i);
                if (noteMatch) order.note = noteMatch[1].trim();

                const priceMatch = text.match(/Ước tính[:\s]*([\d,\.]+)đ/i);
                if (priceMatch) order.price = priceMatch[1];

                const svcIdMatch = text.match(/Service ID[:\s]*(\d+)/i);
                if (svcIdMatch) order.service_id = svcIdMatch[1];

                if (order.order_id) orders.push(order);
            }

            // Dedup theo order_id
            const seen = new Set();
            return orders.filter(o => {
                if (seen.has(o.order_id)) return false;
                seen.add(o.order_id);
                return true;
            }).reverse();

        } catch(e) { return []; }
    }

    async function loadAndRenderTeleOrders() {
        const container = document.getElementById('ordersListContainer');

                        <span class="to-id">#${o.order_id || 'N/A'}</span>

                    ${o.service_name ? `<div class="to-detail">🎯 ${o.service_name}${o.quantity ? ' · ' + Number(o.quantity).toLocaleString() : ''}</div>` : ''}

                    <div class="history-date">${o.date || ''}</div>
                    ${o.link ? `<div class="to-link">${o.link}</div>` : ''}

            `;
        }
        container.innerHTML = html;

        // Click vào đơn để check status

            `;
            document.querySelectorAll('.service-tab').forEach(t => { t.onclick = () => { selectedService = t.dataset.s; selectedSvcIdx = 0; renderForm(); }; });
            document.querySelectorAll('.id-pick-item').forEach(el => { el.onclick = () => { selectedSvcIdx = parseInt(el.dataset.idx); renderForm(); }; });
            const qtyInput = document.getElementById('quantity');
            const estDiv = document.getElementById('priceEst');
            qtyInput.oninput = () => {
                const qty = parseInt(qtyInput.value);
                const entry = (SERVICE_IDS[selectedService] || [])[selectedSvcIdx];
                if (!isNaN(qty) && qty > 0 && entry) estDiv.textContent = `💰 Dự tính: ${calcPriceForSvc(entry, qty).toLocaleString('vi-VN')}đ cho ${qty.toLocaleString()} ${SERVICES[selectedService].unit}`;
                else estDiv.textContent = `💰 Nhập số lượng để xem ước tính`;
            };
            document.getElementById('submitBtn').onclick = async () => {
                const link = document.getElementById('videoLink').value.trim();
                const qty = parseInt(qtyInput.value);
                const entry = (SERVICE_IDS[selectedService] || [])[selectedSvcIdx];
                if (!entry) { showToast("Vui lòng chọn loại dịch vụ!", true); return; }
                if (!link) { showToast("Vui lòng nhập link video", true); return; }
                if (!isValidTikTokUrl(link)) { showToast("Link TikTok không hợp lệ!", true); return; }
                if (isNaN(qty) || qty < entry.min) { showToast(`Tối thiểu ${entry.min.toLocaleString()} ${SERVICES[selectedService].unit}!`, true); return; }
                const note = document.getElementById('orderNote').value.trim();
                if (!isAdmin) {
                    const limitCheck = checkSubKeyLimit(selectedService, qty);
                    if (!limitCheck.allowed) { showToast(limitCheck.message, true); return; }
                }
                await createOrder(link, qty, selectedService, note, entry);
            };
            document.getElementById('cancelBtn').onclick = () => renderDefaultPanel();
        }
        renderForm();
    }

    async function createOrder(link, quantity, serviceType, note = '', svcEntry = null) {
        const svcInfo = SERVICES[serviceType];
        const entryName = svcEntry ? svcEntry.name : svcInfo.name;
        const entryId = svcEntry ? svcEntry.id : '';
        showLoading(true, `Đang tạo đơn ${entryName}...`);
        const result = await apiRequest({ key: API_KEY, action: "add", service: String(entryId), link, quantity: String(quantity) });
        showLoading(false);
        if (result && result.order) {
            const orderId = result.order;
            const priceEst = svcEntry ? calcPriceForSvc(svcEntry, quantity) : 0;
            ordersHistory[orderId] = {
                order_id: orderId, link, quantity, service: serviceType,
                service_name: entryName, service_id: entryId, charge: result.charge, note,
                created_at: new Date().toLocaleString('vi-VN'), status: "Pending"
            };
            saveHistory();
            if (!isAdmin) consumeSubKey(serviceType, quantity);
            sendTelegramNotification(`✅ ĐƠN MỚI: ${entryName.toUpperCase()}\n🔰 Order ID: ${orderId}\n🆔 Service ID: ${entryId}${note ? '\n👤 Tên: ' + note : ''}\n📊 SL: ${quantity.toLocaleString()} ${svcInfo.unit}\n🔗 Link: ${link}\n💰 Ước tính: ${priceEst.toLocaleString('vi-VN')}đ`);
            showToast(`✅ Tạo đơn thành công! Mã: ${orderId}`);
            document.getElementById('dynamicPanel').innerHTML = `
                <div class="panel">
                    <div class="panel-title">✅ Tạo đơn thành công</div>
                    <div class="success-card">
                        <div class="success-icon">🎉</div>
                        <div class="success-title">ĐƠN HÀNG ĐÃ TẠO</div>
                        <div class="success-detail">
                            <div class="success-row"><span class="sk">Order ID</span><span class="sv">#${orderId}</span></div>
                            <div class="success-row"><span class="sk">Dịch vụ</span><span class="sv">${svcInfo.icon} ${entryName}</span></div>
                            <div class="success-row"><span class="sk">Service ID</span><span class="sv">${entryId}</span></div>
                            ${note ? `<div class="success-row"><span class="sk">Tên</span><span class="sv" style="color:var(--yellow)">${note}</span></div>` : ''}
                            <div class="success-row"><span class="sk">Số lượng</span><span class="sv">${quantity.toLocaleString()} ${svcInfo.unit}</span></div>
                            <div class="success-row"><span class="sk">Ước tính</span><span class="sv">${priceEst.toLocaleString('vi-VN')}đ</span></div>
                        </div>
                        <button class="btn btn-secondary" id="backHomeBtn">🏠 Về trang chủ</button>
                    </div>
                </div>
            `;
            document.getElementById('backHomeBtn').onclick = () => renderDefaultPanel();
        } else {
            const errMsg = result?.error || "Không tạo được đơn, kiểm tra số dư hoặc liên hệ admin";
            showToast(`❌ Thất bại: ${errMsg}`, true);
            sendTelegramNotification(`⚠️ LỖI TẠO ĐƠN ${entryName}: ${errMsg}\nLink: ${link}\nSL: ${quantity}`);
        }
    }

    // ======================= CHECK ĐƠN =======================
    function showCheckOrderUI() {
        const panel = document.getElementById('dynamicPanel');
        const lastOrderId = Object.keys(ordersHistory).pop() || '';
        panel.innerHTML = `
            <div class="panel">
                <div class="panel-title">🔍 Kiểm tra trạng thái</div>
                <div class="form-group"><label>🔢 Mã đơn hàng (Order ID)</label><input type="text" id="checkOrderId" placeholder="Nhập Order ID..." value="${lastOrderId}"></div>
                <button class="btn btn-primary" id="checkBtn">🔍 Kiểm tra ngay</button>
                <div id="checkResult"></div>
                <button class="btn btn-secondary" style="margin-top:8px;" id="cancelCheckBtn">↩ Quay lại</button>
            </div>
        `;
        document.getElementById('checkBtn').onclick = async () => {
            const orderId = document.getElementById('checkOrderId').value.trim();
            if (!orderId) { showToast("Vui lòng nhập Order ID", true); return; }
            await fetchOrderStatus(orderId);
        };
        document.getElementById('cancelCheckBtn').onclick = () => renderDefaultPanel();
        document.getElementById('checkOrderId').onkeypress = e => { if (e.key === 'Enter') document.getElementById('checkBtn').click(); };
    }

    async function fetchOrderStatus(orderId) {
        showLoading(true, `Đang kiểm tra đơn #${orderId}...`);
        const result = await apiRequest({ key: API_KEY, action: "status", order: orderId });
        showLoading(false);
        const resultDiv = document.getElementById('checkResult');
        if (!resultDiv) return;
        if (result && result.status !== undefined) {
            if (ordersHistory[orderId]) { ordersHistory[orderId].status = result.status; saveHistory(); }
            const statusBadge = getStatusBadge(result.status);
            const startCount = result.start_count !== undefined ? Number(result.start_count).toLocaleString() : 'N/A';
            const remains = result.remains !== undefined ? Number(result.remains).toLocaleString() : 'N/A';
            const localOrder = ordersHistory[orderId];
            // Tìm trong telegram orders nếu không có local
            const teleOrder = telegramOrders.find(o => o.order_id === orderId);
            const svcName = localOrder ? `${SERVICES[localOrder.service]?.icon || ''} ${localOrder.service_name}` : (teleOrder?.service_name || '—');
            const noteDisp = localOrder?.note || teleOrder?.note || null;
            resultDiv.innerHTML = `
                <div class="status-result-card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <span style="font-family:var(--mono); font-size:0.78rem; color:var(--teal);">#${orderId}</span>
                        ${statusBadge}
                    </div>
                    <div class="status-row"><span class="status-key">Trạng thái</span><span class="status-val">${result.status}</span></div>
                    <div class="status-row"><span class="status-key">Dịch vụ</span><span class="status-val">${svcName}</span></div>
                    ${noteDisp ? `<div class="status-row"><span class="status-key">Tên</span><span class="status-val" style="color:var(--yellow)">${noteDisp}</span></div>` : ''}
                    ${localOrder ? `<div class="status-row"><span class="status-key">Số lượng</span><span class="status-val">${Number(localOrder.quantity).toLocaleString()} ${SERVICES[localOrder.service]?.unit || ''}</span></div>` : ''}
                    <div class="status-row"><span class="status-key">Start count</span><span class="status-val">${startCount}</span></div>
                    <div class="status-row"><span class="status-key">Còn lại</span><span class="status-val">${remains}</span></div>
                    ${localOrder ? `<div class="status-row"><span class="status-key">Tạo lúc</span><span class="status-val" style="font-size:0.68rem;">${localOrder.created_at}</span></div>` : ''}
                    ${teleOrder && !localOrder ? `<div class="status-row"><span class="status-key">Tạo lúc</span><span class="status-val" style="font-size:0.68rem;">${teleOrder.date}</span></div>` : ''}
                </div>
            `;
        } else {
            const errMsg = result?.error || "Không tìm thấy đơn hàng này";
            resultDiv.innerHTML = `<div style="text-align:center; padding:14px; color:var(--red); font-size:0.82rem; margin-top:10px; font-family:var(--font);">❌ ${errMsg}</div>`;
            showToast(`❌ ${errMsg}`, true);
        }
    }

    // ======================= LỊCH SỬ (THIẾT BỊ HIỆN TẠI) =======================
    function showHistoryUI() {
        const panel = document.getElementById('dynamicPanel');
        const orders = Object.values(ordersHistory).reverse();
        if (orders.length === 0) {
            panel.innerHTML = `
                <div class="panel" style="text-align:center; padding:28px 14px;">
                    <div style="font-size:1.8rem; margin-bottom:9px;">📭</div>
                    <div style="color:var(--text-dim); font-size:0.82rem; font-family:var(--font);">Chưa có đơn nào trên thiết bị này</div>
                    <div style="color:var(--text-dim); font-size:0.72rem; margin-top:6px; font-family:var(--font);">Mọi đơn đều lưu trên Telegram (Admin xem qua Quản lý đơn)</div>
                    <button class="btn btn-secondary" style="margin-top:14px;" id="backHistory">↩ Quay lại</button>
                </div>`;
            document.getElementById('backHistory').onclick = () => renderDefaultPanel();
            return;
        }
        let html = `<div class="panel"><div class="panel-title">📋 Lịch sử thiết bị này (${orders.length})</div>`;
        for (const d of orders) {
            const svc = SERVICES[d.service] || {};
            html += `
                <div class="history-item" data-oid="${d.order_id}">
                    <div class="history-header"><span class="history-id">#${d.order_id}</span>${getStatusBadge(d.status)}</div>
                    <div class="history-detail">${svc.icon || ''} ${d.service_name || d.service} · ${Number(d.quantity).toLocaleString()} ${svc.unit || ''}</div>
                    ${d.note ? `<div style="font-size:0.7rem; color:var(--yellow); margin-bottom:2px; font-weight:600; font-family:var(--font);">👤 ${d.note}</div>` : ''}
                    <div class="history-date" style="margin-bottom:3px;">${d.created_at || ''}</div>
                    <div class="history-link">${d.link || ''}</div>
                </div>`;
        }
        html += `
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-top:4px;">
                <button class="btn btn-danger" id="clearHistoryBtn">🗑️ Xóa lịch sử</button>
                <button class="btn btn-secondary" id="backHistoryBtn">↩ Quay lại</button>
            </div>
        </div>`;
        panel.innerHTML = html;
        panel.querySelectorAll('.history-item').forEach(item => {
            item.onclick = () => {
                const oid = item.dataset.oid;
                showCheckOrderUI();
                setTimeout(() => { const inp = document.getElementById('checkOrderId'); if (inp) { inp.value = oid; document.getElementById('checkBtn')?.click(); } }, 100);
            };
        });
        document.getElementById('clearHistoryBtn').onclick = () => {
            if (confirm("Xóa toàn bộ lịch sử đơn hàng trên thiết bị này?")) { ordersHistory = {}; saveHistory(); showHistoryUI(); showToast("Đã xóa lịch sử"); }
        };
        document.getElementById('backHistoryBtn').onclick = () => renderDefaultPanel();
    }

    // ======================= BALANCE WATCH =======================
    let balanceWatchInterval = null;
    let prevBalanceVND = null;
    function startBalanceWatch() {
        if (balanceWatchInterval) clearInterval(balanceWatchInterval);
        balanceWatchInterval = setInterval(async () => {
            const result = await apiRequest({ key: API_KEY, action: "balance" });
            if (!result || result.balance === undefined) return;
            const curVnd = usdToVnd(result.balance);
            if (prevBalanceVND !== null && curVnd !== null && curVnd !== prevBalanceVND && curVnd > prevBalanceVND) {
                const diff = curVnd - prevBalanceVND;
                sendTelegramNotification(`✅ <b>SỐ DƯ ĐÃ ĐƯỢC CỘNG</b>\n━━━━━━━━━━━━━━\n📊 Số dư cũ: ${prevBalanceVND.toLocaleString('vi-VN')}đ\n📈 Số dư mới: ${curVnd.toLocaleString('vi-VN')}đ\n💰 Số tiền nạp: <b>+${diff.toLocaleString('vi-VN')}đ</b>\n🕐 ${new Date().toLocaleString('vi-VN')}`);
            }
            prevBalanceVND = curVnd;
        }, 30000);
    }

    // ======================= KHỞI TẠO =======================
    loadHistory();
    loadSubKeyUsage();
    loadDepositRequests();
    showStartScreen();
</script>

</body>
</html>
